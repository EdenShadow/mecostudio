        reasons.push('task_done_waiting_near_end_callback');
      }
      if (reasons.length === 0) return null;
      if (ROUNDTABLE_DISABLE_FAILURE_RECOVERY) {
        reasons.push('auto_recovery_disabled');
      }

      return {
        agentId: agentId,
        reasons: reasons,
        turnAgeMs: turnAgeMs,
        lastTextChunkAgoMs: lastTextChunkAgoMs,
        lastTtsMsgAgoMs: lastTtsMsgAgoMs,
        lastTtsEvent: mgr._lastTtsEvent || 'none',
        wsState: wsStateName(wsState),
        textComplete: !!mgr.textComplete,
        audioStarted: !!mgr.audioStarted,
        taskFinished: !!mgr.taskFinished,
        callbackFired: !!mgr.callbackFired,
        activeSources: Number(mgr.activeSources || 0),
        audioQueue: audioQueue,
        waitingPrev: !!mgr._waitForPrevSpeaker,
        isSpeaking: !!isSpeaking,
        currentSpeaker: currentSpeaker || null
      };
    }

    function logLocalStuckDiagnostics() {
      if (!roundTableActive) return;
      var agentIds = window.roomAgentIds || AGENT_IDS;
      var now = Date.now();
      for (var i = 0; i < agentIds.length; i++) {
        var agentId = agentIds[i];
        var mgr = ttsManagers[agentId];
        if (!mgr) continue;
        var diag = buildLocalStuckDiagnostics(agentId);
        if (!diag) {
          if (mgr._lastStuckDiagKey) {
            console.log('[STUCK_DIAG][local][' + agentId + '] cleared');
            mgr._lastStuckDiagKey = '';
            mgr._lastStuckDiagAt = 0;
          }
          continue;
        }
        var signature = diag.reasons.join('|') + '|' + diag.wsState + '|' + String(diag.currentSpeaker || '');
        if (signature !== mgr._lastStuckDiagKey || (now - mgr._lastStuckDiagAt) >= STUCK_DIAG_REPEAT_MS) {
          console.warn(
            '[STUCK_DIAG][local][' + agentId + '] reasons=' + diag.reasons.join('|') +
            ' | turnAge=' + diag.turnAgeMs + 'ms' +
            ' | ws=' + diag.wsState +
            ' | textComplete=' + diag.textComplete +
            ' | audioStarted=' + diag.audioStarted +
            ' | taskFinished=' + diag.taskFinished +
            ' | callbackFired=' + diag.callbackFired +
            ' | activeSources=' + diag.activeSources +
            ' | audioQueue=' + diag.audioQueue +
            ' | lastTextChunkAgo=' + diag.lastTextChunkAgoMs + 'ms' +
            ' | lastTtsMsgAgo=' + diag.lastTtsMsgAgoMs + 'ms' +
            ' | lastTtsEvent=' + diag.lastTtsEvent +
            ' | waitingPrev=' + diag.waitingPrev +
            ' | currentSpeaker=' + (diag.currentSpeaker || 'null')
          );
          mgr._lastStuckDiagKey = signature;
          mgr._lastStuckDiagAt = now;
        }
      }
    }

    function applyRoundTableUiState(isActive, options) {
      options = options || {};
      roundTableActive = !!isActive;

      var createBtn = document.getElementById('btn-create-room');
      var stopBtn = document.getElementById('btn-stop-all');
      var muteBtn = document.getElementById('btn-mute-toggle');
      if (!createBtn || !stopBtn || !muteBtn) return;

      if (roundTableActive) {
        createBtn.style.display = 'none';
        stopBtn.style.display = 'inline';
        muteBtn.style.display = 'inline';
      } else {
        createBtn.style.display = 'inline';
        stopBtn.style.display = 'none';
        muteBtn.style.display = 'none';
      }

      if (options.keepCreateHidden) {
        createBtn.style.display = 'none';
      }

      if (options.updateStatus) {
        var statusEl = document.getElementById('rt-status');
        if (statusEl) {
          statusEl.textContent = options.statusText || (roundTableActive ? '讨论中' : '已下播（房间连接保持）');
        }
      }
    }

    function buildStreamingControlKey(data) {
      var ts = (data && data.data && data.data.timestamp) ? String(data.data.timestamp) : '';
      var mid = data && data.message_id ? String(data.message_id) : '';
      if (mid) return mid;
      return [data && data.command ? data.command : '', ts, data && data.timestamp ? data.timestamp : ''].join('|');
    }

    function parseStreamingControlTimestampMs(data) {
      if (!data) return 0;
      var raw = (data.timestamp || (data.data && data.data.timestamp) || '').toString().trim();
      if (!raw) return 0;
      var ms = Date.parse(raw);
      return Number.isFinite(ms) ? ms : 0;
    }

    function markStreamingControlHandled(key) {
      if (!key) return;
      processedStreamingControlIds.add(key);
      // 避免集合无限增长
      if (processedStreamingControlIds.size > 300) {
        processedStreamingControlIds.clear();
      }
    }

    function extractLastNextDirectiveName(text) {
      var source = String(text || '');
      if (!source) return null;
      var lastName = null;
      var match = null;
      while ((match = NEXT_DIRECTIVE_RE.exec(source)) !== null) {
        var raw = String(match[1] || '').trim();
        if (raw) lastName = raw;
      }
      NEXT_DIRECTIVE_RE.lastIndex = 0;
      return lastName;
    }

    function stripNextDirectives(text) {
      var source = String(text || '');
      if (!source) return '';
      return source
        .replace(NEXT_DIRECTIVE_RE, '')
        .replace(/[ \t]+\n/g, '\n')
        .replace(/\n{3,}/g, '\n\n')
        .trim();
    }

    function handleStreamingControlMessage(data) {
      if (!data || !data.command) return;

      var key = buildStreamingControlKey(data);
      if (key && processedStreamingControlIds.has(key)) {
        console.log('[Room] 跳过重复控制命令:', data.command, key);
        return;
      }
      markStreamingControlHandled(key);

      var command = data.command;
      if (command === 'start_streaming') {
        var startTsMs = parseStreamingControlTimestampMs(data);
        if (startTsMs > 0 && (Date.now() - startTsMs) > 120000) {
          console.warn('[Room] 忽略过期 start_streaming: age=' + Math.round((Date.now() - startTsMs) / 1000) + 's');
          return;
        }
        if (roundTableActive || moderatorStartInFlight) {
          console.log('[Room] 忽略 start_streaming：当前已开播或正在开播');
          return;
        }
        document.getElementById('rt-status').textContent = '收到 room 开播命令，正在开播...';
        // 默认使用上次选择语言，没有则中文
        startModerator(lastSelectedLang || 'zh', { source: 'room_start_streaming' });
        return;
      }

      if (command === 'stop_streaming') {
        var stopTsMs = parseStreamingControlTimestampMs(data);
        var cmdRoomId = (data && data.data && data.data.room_id) ? String(data.data.room_id).trim() : '';
        if (cmdRoomId && currentPodcastRoomId && cmdRoomId !== currentPodcastRoomId) {
          console.warn('[Room] 忽略 stop_streaming: room_id 不匹配 cmd=' + cmdRoomId + ', current=' + currentPodcastRoomId);
          return;
        }
        // 保护：忽略明显过期的停播指令（通常是断线后补发的旧命令）
        if (stopTsMs > 0 && (Date.now() - stopTsMs) > 120000) {
          console.warn('[Room] 忽略过期 stop_streaming: age=' + Math.round((Date.now() - stopTsMs) / 1000) + 's');
          return;
        }
        // 保护：若命令时间早于本轮开播时间，则判定为旧会话残留
        if (stopTsMs > 0 && roundtableStartedAtMs > 0 && stopTsMs + 2000 < roundtableStartedAtMs) {
          console.warn('[Room] 忽略旧会话 stop_streaming: cmd=' + new Date(stopTsMs).toISOString() + ', started=' + new Date(roundtableStartedAtMs).toISOString());
          return;
        }
        document.getElementById('rt-status').textContent = '收到 room 下播命令，正在下播...';
        // 服务端停播命令必须强制执行，避免前端状态不同步时音频继续推流
        stopAll({ force: true, source: 'room_stop_streaming' });
      }
    }

    function clearAgentStreamIdleTimer(agentId) {
      if (typingTimeouts[agentId]) {
        clearTimeout(typingTimeouts[agentId]);
        typingTimeouts[agentId] = null;
      }
    }

    function scheduleAgentStreamIdleTimeout(agentId) {
      if (ROUNDTABLE_DISABLE_FAILURE_RECOVERY) return;
      clearAgentStreamIdleTimer(agentId);
      typingTimeouts[agentId] = setTimeout(function() {
        if (streamFinalized[agentId]) return;
        var buffered = (typingBuffers[agentId] || '').trim();
        if (!buffered) {
          console.warn('[' + agentId + '] ⏰ 流式长时间无 chunk（空文本），触发兜底收敛');
        }
        console.warn('[' + agentId + '] ⏰ 流式长时间无 chunk，强制按 end 收敛');
        finalizeAgentTurn(agentId, 'idle-timeout');
      }, STREAM_IDLE_FORCE_END_MS);
    }

    function finalizeAgentTurn(agentId, reason) {
      if (streamFinalized[agentId]) return;
      streamFinalized[agentId] = true;
      clearAgentStreamIdleTimer(agentId);

      // 被打断静音的 agent：只清 loading，不触发后续流程
      if (ttsManagers[agentId]._muted) {
        console.log('[' + agentId + '] ❌ 忽略 end（已被打断静音）');
        setLoading(agentId, false);
        return;
      }

      if (typingTimeouts[agentId]) clearTimeout(typingTimeouts[agentId]);
      finalizeMessage(agentId, typingBuffers[agentId]);

      if (reason) {
        console.log('[' + agentId + '] 文本输出完成 (' + reason + ')');
      } else {
        console.log('[' + agentId + '] 文本输出完成');
      }

      // 主机：文本完成，通知服务端广播给分机
      if (isHost && currentChannel) {
        var finalText = typingBuffers[agentId];
        fetch('/api/room/' + currentChannel + '/text-sync', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            agentId: agentId,
            text: finalText,
            isComplete: true
          })
        }).catch(function(err) {
          console.error('[Room] 文本同步失败:', err);
        });
      }

      // 圆桌讨论：标记文本完成，检查是否可以准备下一位
      var rawSpeechContent = currentSpeechBuffers[agentId] || typingBuffers[agentId] || '';
      var speechContent = String(rawSpeechContent || '').trim();
        var fallbackSpeechContent = '[系统兜底] 当前轮文本未完整返回，请继续下一位。';
        if (roundTableActive) {
        var capturedContent = speechContent || (ROUNDTABLE_DISABLE_FAILURE_RECOVERY ? '' : fallbackSpeechContent);
        var capturedId = agentId;
        
        // 从 AI 回复内容中提取 {next: ...} 标记（支持各种大小写和空格格式）
        var extractedDesignatedNext = extractLastNextDirectiveName(capturedContent);
        if (extractedDesignatedNext) {
          console.log('[' + agentId + '] 🎯 从回复内容中提取到指定发言者:', extractedDesignatedNext);
        } else {
          console.log('[' + agentId + '] 🧭 未检测到显式 {next}，按系统麦序调度下一位');
        }

        // 从 AI 回复内容中提取 {changeTopic: true} 标记
        var changeTopicMatch = capturedContent.match(/\{changeTopic:\s*true\s*\}/);
        var extractedChangeTopic = !!changeTopicMatch;
        if (extractedChangeTopic) {
          console.log('[' + agentId + '] 🔄 从回复内容中提取到换话题请求');
        }
        if (!speechContent) {
          if (ROUNDTABLE_DISABLE_FAILURE_RECOVERY) {
            console.warn('[' + agentId + '] ⚠️ end/idle 收敛时文本为空（调试模式：不上兜底文本）');
          } else {
            console.warn('[' + agentId + '] ⚠️ end/idle 收敛时文本为空，使用兜底内容推进麦序');
          }
        }

        // 保存回调函数
        ttsManagers[agentId].onNearEnd = function() {
          notifySpeechEnded(capturedId, capturedContent, extractedDesignatedNext, extractedChangeTopic);
        };

        // 标记文本推理完成并触发预加载
        ttsManagers[agentId].textComplete = true;
        ttsManagers[agentId].checkPrepareNext('文本完成');

        // 安全兜底：调试模式下禁用，避免自动推进掩盖真实失败
        if (!ROUNDTABLE_DISABLE_FAILURE_RECOVERY) {
          (function(mgr, cId) {
            function safetyCheck() {
              if (mgr.callbackFired) return; // 已触发过，不需要兜底
              if (!mgr.audioStarted) {
                // 还没开始播放（等待前一位），不强制触发，重新排期
                console.log('[' + cId + '] ⏰ 安全检查：audioStarted=false，尚未开始播放，重新等待30秒');
                mgr._safetyTimer = setTimeout(safetyCheck, 30000);
                return;
              }
              if (!AUTO_SKIP_ON_FAILURE) {
                console.warn('[' + cId + '] ⏰ 安全检查命中，但按配置不自动跳过');
                return;
              }
              console.error('[' + cId + '] ⏰ 30秒安全兜底触发！强制 notifySpeechEnded');
              mgr.fireNearEndCallback('30s安全兜底');
            }
            mgr._safetyTimer = setTimeout(safetyCheck, 30000);
          })(ttsManagers[agentId], agentId);
        }
      }

      ttsManagers[agentId].appendText('', true);
      typingBuffers[agentId] = '';
      currentSpeechBuffers[agentId] = '';
      setLoading(agentId, false);
    }

    function handleMessage(agentId, data) {
      if (data.type === 'streaming_control') {
        handleStreamingControlMessage(data);
        return;
      }

      // 处理房间相关消息
      if (data.type === 'speaker_changed') {
        console.log('[Room] 发言人变化:', data.agentId);
        return;
      }

      // 主机调整了某个 agent 的音量
      if (data.type === 'volume_update') {
        var mgr = ttsManagers[data.agentId];
        if (mgr) {
          mgr.volumeGain = data.volumeGain;
          if (mgr.gainNode && !localMuted) {
            mgr.gainNode.gain.value = data.volumeGain;
          }
        }
        // 同步 slider UI
        var slider = document.getElementById('volume-' + data.agentId);
        if (slider) slider.value = Math.round(data.volumeGain * 100);
        var valLabel = document.getElementById('volume-val-' + data.agentId);
        if (valLabel) valLabel.textContent = Math.round(data.volumeGain * 100) + '%';
        return;
      }

      // 实时 TTS 音频块（主机广播）
      if (data.type === 'audio_chunk') {
        // 分机暂时不使用实时音频块，依赖轮询播放缓存
        // 避免解码错误和卡顿问题
        return;
      }

      // 文本同步（主机广播的 agent 回复）
      if (data.type === 'text_sync') {
        // 所有客户端直接通过 WebSocket chunk 获取文本，不依赖 text_sync
        return;
        console.log('[Room] 回复文本同步:', data.agentId, '完整:', data.isComplete);
        if (false) {
          // 显示流式文本
          if (!data.isComplete) {
            // 流式更新 - 追加到当前消息
            updateStreamingMessage(data.agentId, data.text);
          } else {
            // 完成 - 显示最终消息（agent 回复，不加主持人前缀）
            addMessage(data.agentId, data.text, 'assistant');
          }
        }
        return;
      }

      // 主持人文本同步（服务端广播）
      if (data.type === 'moderator_sync') {
        console.log('[Room] 主持人文本同步:', data.agentId, '消息:', data.message.substring(0, 50));
        // 所有客户端都通过 WebSocket 直接收到文本，不需要 moderator_sync
        return;
      }

      // 下一个发言人准备（主机广播）- 这个是在前一位发言人的文本完成时发出的
      if (data.type === 'speaker_prepared') {
        console.log('[Room] 下一位发言人已准备:', data.nextAgentId);
        nextSpeakerPending = data.nextAgentId;
        return;
      }

      if (data.type === 'room_missing') {
        console.warn('[Room] 收到 room_missing，停止本地播放并自动恢复房间');
        nextSpeakerPending = null;
        hardStopLocalAudioAndTTS();
        resetRoundtableRuntime();
        roundtableStartedAtMs = 0;
        applyRoundTableUiState(false, { updateStatus: true, statusText: '房间已失效，正在自动重建连接...' });
        if (currentChannel) {
          recoverMissingRoom('ws_room_missing_message');
        }
        return;
      }

      if (data.type === 'interrupt') {
        var interruptReason = String((data && data.reason) || '');
        var isServerStopInterrupt =
          !!(data && data.forceStopAudio) ||
          interruptReason === 'server_stop' ||
          interruptReason === 'pre_restart' ||
          interruptReason === 'manual_click' ||
          interruptReason === 'roundtable_stop';
        console.log('[Room] 收到打断消息', interruptReason ? ('reason=' + interruptReason) : '');

        if (isServerStopInterrupt) {
          nextSpeakerPending = null;
          hardStopLocalAudioAndTTS();
          resetRoundtableRuntime();
          roundtableStartedAtMs = 0;
          applyRoundTableUiState(false, { updateStatus: true, statusText: '已下播（服务端停止）' });
          return;
        }

        // 打断当前所有播放，重置状态
        nextSpeakerPending = null;
        Object.keys(ttsManagers).forEach(function(id) {
          if (ttsManagers[id]) {
            ttsManagers[id].mute();
            ttsManagers[id].reset();
          }
        });
        // 显示提示
        document.getElementById('rt-status').textContent = '讨论被中断，重新开始...';
        return;
      }

      if (data.type === 'topic_changed') {
        console.log('[Room] 收到话题变化:', data.topicData);
        if (data.topicData) {
          updateTopicBar(data.topicData);
        }
        return;
      }

      if (data.type === 'topic_queue_update') {
        console.log('[Room] 收到麦序更新:', data.topics?.length);
        updateQueueBar(data.topics);
        return;
      }

      if (data.type === 'topic_queue_status') {
        console.log('[Room] 麦序状态:', data.queue_id, data.crawl_status, data.saved_path || '');
        updateQueueItemBadge(data.queue_id, data.crawl_status, data.saved_path || '', data.crawl_error || '');
        return;
      }

      if (data.type === 'host_disconnected') {
        console.log('[Room] 主持人已断开');
        alert('主持人已断开，房间即将关闭');
        stopRoom();
        return;
      }

      switch (data.type) {
        case 'system':
          addMessage(agentId, data.content, 'system');
          break;
        case 'moderator':
          console.log('[' + agentId + '] 📨 收到 moderator 消息 | userInterruptTarget=' + userInterruptTarget + ' | _muted=' + ttsManagers[agentId]._muted + ' | connected=' + connections[agentId].connected);
          if (streamFinalized[agentId] === false) {
            var modMgr = ttsManagers[agentId];
            var moderatorInFlight = !!(
              modMgr.audioStarted ||
              modMgr.activeSources > 0 ||
              modMgr._waitForPrevSpeaker ||
              (typingBuffers[agentId] && typingBuffers[agentId].length > 0) ||
              (currentSpeechBuffers[agentId] && currentSpeechBuffers[agentId].length > 0)
            );
            if (moderatorInFlight) {
              console.warn('[' + agentId + '] ⚠️ 忽略重复 moderator：当前轮仍在进行');
              break;
            }
            // 状态漂移自修复：若无在途内容但标记仍为未收敛，放行本次 moderator
            console.warn('[' + agentId + '] ⚠️ 检测到未收敛标记漂移，自动修复后继续');
            streamFinalized[agentId] = true;
          }
          // 收到 moderator 消息，清除打断状态
          isInterrupted = false;
          // 用户打断后：收到任何 moderator 消息都解除打断状态
          // 注意： moderator 可能会选择不同的 agent（不一定是被打断的那个），所以不能基于 agentId 过滤
          if (userInterruptTarget) {
            console.log('[' + agentId + '] ✅ 收到 moderator 消息（打断后），解除过滤和静音');
            ttsManagers[agentId]._muted = false;
            userInterruptTarget = null;
          }
          // 主持人消息：显示并立即触发回复
          // 过滤掉 {next: ...} 标记，用于TTS和发送给AI（但不影响GUI显示）
          const cleanMessage = stripNextDirectives(data.message);
          
          // GUI显示原始消息（带{next: ...}），让用户能看到指定标记
          addMessage(agentId, '[主持人] ' + data.message, 'system');

          // [已移除] 不要从主持人消息中提取话题，这会导致话题卡信息丢失（封面图等）
          // 话题更新应完全依赖 topic_changed 事件
          /*
          var topicMatch = data.message.match(/主话题[：:]\s*["「]([^"」]+)["」]/);
          if (!topicMatch) {
            topicMatch = data.message.match(/Topic[：:]\s*["「]([^"」]+)["」]/);
          }
          if (topicMatch && topicMatch[1]) {
            updateTopicBar({ title: topicMatch[1], postData: {}, coverUrl: '' });
          }
          */

          ttsManagers[agentId].speechType = data.speechType || 'next';
          console.log('[' + agentId + '] 收到主持人消息 (' + (data.speechType || 'next') + ')，开始生成回复');

          // 标记当前发言人（用于串行控制，防止连锁触发）
          // 注意：这个不是用于滚动的，滚动使用 speaker_prepared 消息中设置的 nextSpeakerPending
          // 对于第一位发言人（没有上一位），这个值也会被用于滚动
          if (!nextSpeakerPending) {
            nextSpeakerPending = agentId;
            console.log('[RoundTable] 设置 nextSpeakerPending (首位发言人): ' + agentId);
          }

          // 调试模式：禁用 chat 自动重试，失败直接暴露
          if (ROUNDTABLE_DISABLE_FAILURE_RECOVERY) {
            var directWs = connections[agentId] && connections[agentId].ws;
            if (directWs && directWs.readyState === WebSocket.OPEN) {
              directWs.send(JSON.stringify({ type: 'chat', message: cleanMessage }));
              console.log('[' + agentId + '] ✅ chat 消息已发送（单次）');
            } else {
              console.error('[' + agentId + '] ❌ chat 发送失败（调试模式：不重试）');
              addMessage(agentId, '[系统] chat 发送失败（调试模式：不重试）', 'system');
            }
          } else {
            // 发送 chat 消息（带重连重试，避免卡在“准备中”）
            sendAgentChatWithRetry(agentId, cleanMessage, 10, 800).then(function(sent) {
              if (sent) {
                console.log('[' + agentId + '] ✅ chat 消息已发送');
                return;
              }
              addMessage(agentId, '[系统] 连接超时，未自动跳过，等待手动处理', 'system');
            });
          }
          break;
        case 'start':
          // 打断后忽略 start 消息（在 handleMessage 开头已处理）
          // 被打断静音的 agent：解除静音并正常处理
          if (ttsManagers[agentId]._muted) {
            console.log('[' + agentId + '] 🔓 start 消息到达，自动解除静音');
            ttsManagers[agentId]._muted = false;
          }

          var startMgr = ttsManagers[agentId];
          if (streamFinalized[agentId] === false) {
            var hasInFlightTurn = !!(
              startMgr.audioStarted ||
              startMgr.activeSources > 0 ||
              startMgr._waitForPrevSpeaker ||
              (typingBuffers[agentId] && typingBuffers[agentId].length > 0) ||
              (currentSpeechBuffers[agentId] && currentSpeechBuffers[agentId].length > 0)
            );
            if (hasInFlightTurn) {
              console.warn('[' + agentId + '] ⚠️ 忽略重复 start：当前轮仍在进行');
              break;
            }
          }

          // 普通模式处理
          typingBuffers[agentId] = '';
          currentSpeechBuffers[agentId] = '';
          setLoading(agentId, true);

          ttsManagers[agentId].reset();
          ttsManagers[agentId]._turnStartedAt = Date.now();
          streamFinalized[agentId] = false;
          clearAgentStreamIdleTimer(agentId);

          // 让新发言人的音频等上一位自然播完，不打断
          console.log('[' + agentId + '] 📌 设置 _waitForPrevSpeaker: ' + (prevSpeakerDone ? '已设置' : '未设置'));
          ttsManagers[agentId]._waitForPrevSpeaker = prevSpeakerDone;
          // 创建本轮的 "我说完了" Promise
          prevSpeakerDone = new Promise(function(resolve) {
            ttsManagers[agentId]._resolveMyDone = resolve;
          });

          // 进入“预准备”阶段：只准备文本/TTS，不抢占全局说话锁
          // 全局说话锁在真正开始播放音频时再设置，避免出现“预准备的人提前占位”
          console.log('[' + agentId + '] 开始发言准备（文本+TTS 预准备）');

          // 桌面端自动滚动到当前发言人（移动端在音频开始播放时滚动）
          if (window.innerWidth > 768) {
            scrollToAgent(agentId);
          }
          break;
        case 'chunk':
          // [已移除分机模式] 所有客户端直接处理 chunk

          // 被打断静音的 agent：不显示文本也不生成 TTS
          if (ttsManagers[agentId]._muted) break;
          if (streamFinalized[agentId]) {
            console.warn('[' + agentId + '] ⚠️ 收到迟到 chunk（本轮已收敛），忽略');
            break;
          }
          typingBuffers[agentId] += data.content;
          currentSpeechBuffers[agentId] += data.content;
          ttsManagers[agentId]._lastTextChunkAt = Date.now();
          updateStreamingMessage(agentId, typingBuffers[agentId]);
          ttsManagers[agentId].appendText(data.content, false);
          scheduleAgentStreamIdleTimeout(agentId);

          // 主机：实时广播文本块给分机
          if (isHost && currentChannel) {
            fetch('/api/room/' + currentChannel + '/text-sync', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                agentId: agentId,
                text: typingBuffers[agentId],
                isComplete: false
              })
            }).catch(function() {});
          }
          break;
        case 'end':
          // [已移除分机模式] 所有客户端直接处理 end
          finalizeAgentTurn(agentId, 'end');
          break;
        case 'error':
          // 被打断静音的 agent：忽略错误，不触发任何回调
          if (ttsManagers[agentId]._muted) {
            console.log('[' + agentId + '] ❌ 忽略 error（已被打断静音）');
            clearAgentStreamIdleTimer(agentId);
            streamFinalized[agentId] = true;
            setLoading(agentId, false);
            break;
          }

          var errMsg = (data && data.message) ? String(data.message) : 'fetch 失败';
          clearAgentStreamIdleTimer(agentId);
          streamFinalized[agentId] = true;
          addMessage(agentId, '[推理失败] ' + errMsg, 'error');
          setLoading(agentId, false);

          if (ROUNDTABLE_DISABLE_FAILURE_RECOVERY) {
            console.warn('[' + agentId + '] ⚠️ 推理失败（调试模式：不自动收敛/不自动跳过）');
            break;
          }
          // 非调试模式：错误分支没有音频播放，必须主动收敛本轮状态，避免下一位永远等待
          var errMgr = ttsManagers[agentId];
          errMgr.taskFinished = true;
          errMgr.callbackFired = true;
          if (errMgr._resolveMyDone) {
            errMgr._resolveMyDone();
            errMgr._resolveMyDone = null;
          }
          if (isSpeaking && currentSpeaker === agentId) {
            isSpeaking = false;
            currentSpeaker = null;
          }
          if (roundTableActive) {
            console.warn('[' + agentId + '] ⚠️ error 后按配置不自动跳过下一位');
          }
          break;
      }
    }
    
    // 通知服务端语音播放完成
    function notifySpeechEnded(agentId, content, designatedNextFromContent, changeTopic) {
      var mgr = ttsManagers[agentId];
      var remaining = mgr.audioContext ? (mgr.nextTime - mgr.audioContext.currentTime) : -1;
      // 只认发言内容里的显式 {next}，不再使用主持人提示词里的示例做兜底
      var designatedNext = designatedNextFromContent || null;
      console.log('[' + agentId + '] ★★ notifySpeechEnded → 通知服务端 | 音频剩余=' + remaining.toFixed(1) + 's | activeSources=' + mgr.activeSources + (designatedNext ? ' | 指定下一个:' + designatedNext : ' | 指定下一个:null') + (changeTopic ? ' | 🔄 换话题' : ''));

      var body = {
        agentId: agentId,
        content: content,
        designatedNextAgent: changeTopic ? null : designatedNext,
        changeTopic: !!changeTopic
      };
      if (currentChannel) {
        body.channelId = currentChannel;
      }

      fetch('/api/roundtable/speech-ended', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      }).catch(function(err) {
        console.error('语音回调失败:', err);
      });
    }
    
    function updateStreamingMessage(agentId, content) {
      var messagesDiv = document.getElementById('messages-' + agentId);
      var messageDiv = messagesDiv.querySelector('.message.assistant.streaming');
      
      if (!messageDiv) {
        messageDiv = document.createElement('div');
        messageDiv.className = 'message assistant streaming';
        messagesDiv.appendChild(messageDiv);
      }
      
      messageDiv.textContent = content;
      scrollToBottom(agentId);
    }

    function finalizeMessage(agentId, content) {
      var messagesDiv = document.getElementById('messages-' + agentId);
      var messageDiv = messagesDiv.querySelector('.message.assistant.streaming');
      if (messageDiv) {
        messageDiv.classList.remove('streaming');
        messageDiv.textContent = content;
        messageHistory[agentId].push({ role: 'assistant', content: content });
      } else if (content) {
        // 如果没有找到流式消息，创建一个新的
        addMessage(agentId, content, 'assistant');
        messageHistory[agentId].push({ role: 'assistant', content: content });
      }
    }

    // 同步检查圆桌状态（用于sendMessage时立即获取最新状态）
    function checkRoundTableActive() {
      var url = '/api/roundtable/status';
      if (currentChannel) {
        url += '?channelId=' + encodeURIComponent(currentChannel);
      }
      var syncXhr = new XMLHttpRequest();
      syncXhr.open('GET', url, false); // 同步请求
      try {
        syncXhr.send();
        if (syncXhr.status === 200) {
          var data = JSON.parse(syncXhr.responseText);
          return data.isActive;
        }
      } catch(e) {
        console.log('[Chat] ⚠️ 同步检查失败，使用缓存值');
      }
      return roundTableActive; // 降级使用缓存值
    }

    function sendAgentChatWithRetry(agentId, message, maxRetries, delayMs) {
      var max = typeof maxRetries === 'number' ? maxRetries : 10;
      var delay = typeof delayMs === 'number' ? delayMs : 800;

      function attempt(tryCount) {
        var ws = connections[agentId] && connections[agentId].ws;
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'chat', message: message }));
          return Promise.resolve(true);
        }

        if (tryCount === 0) {
          console.warn('[' + agentId + '] chat 发送前连接未就绪，尝试重连');
        }

        if (tryCount >= max) {
          console.error('[' + agentId + '] chat 发送失败：重试耗尽');
          return Promise.resolve(false);
        }

        if (!ws || ws.readyState === WebSocket.CLOSED || ws.readyState === WebSocket.CLOSING) {
          try { initConnection(agentId); } catch (e) {}
        }

        return new Promise(function(resolve) {
          setTimeout(function() {
            resolve(attempt(tryCount + 1));
          }, delay);
        });
      }

      return attempt(0);
    }

    function sendMessage(agentId) {
      var input = document.getElementById('input-' + agentId);
      var content = input.value.trim();
      if (!content) {
        console.log('[Chat] ❌ 输入为空');
        return;
      }

      // 立即同步检查圆桌状态，确保使用最新值
      var isActive = checkRoundTableActive();
      console.log('[Chat] 📤 sendMessage | agentId=' + agentId + ' | roundTableActive(sync)=' + isActive + ' | content=' + content.substring(0, 20));

      addMessage(agentId, content, 'user');
      messageHistory[agentId].push({ role: 'user', content: content });

      // 如果圆桌未开启，直接发送消息（单聊模式）
      if (!isActive) {
        // 单聊模式：直接发送给agent
        if (connections[agentId] && connections[agentId].ws && connections[agentId].connected) {
          connections[agentId].ws.send(JSON.stringify({ type: 'chat', message: content }));
        } else {
          console.log('[Chat] ❌ Agent未连接: ' + agentId);
        }
        input.value = '';
        return;
      }

      // 圆桌讨论模式：使用打断逻辑
      userInterruptTarget = agentId;
      isInterrupted = true;

      // 清空发言队列和等待链
      nextSpeakerPending = null;
      prevSpeakerDone = Promise.resolve();

      // 清空所有状态
      Object.keys(messageHistory).forEach(function(id) { messageHistory[id] = []; });
      Object.keys(currentSpeechBuffers).forEach(function(id) { currentSpeechBuffers[id] = ''; });
      Object.keys(typingBuffers).forEach(function(id) { typingBuffers[id] = ''; });
      Object.keys(connections).forEach(function(id) {
        if (document.getElementById('messages-' + id)) document.getElementById('messages-' + id).innerHTML = '';
        var btn = document.getElementById('btn-' + id);
        if (btn) { btn.disabled = false; btn.textContent = '发送'; }
      });

      // 停止所有音频
      Object.keys(ttsManagers).forEach(function(id) {
        if (ttsManagers[id]) {
          ttsManagers[id].stopPlayback();
          ttsManagers[id].audioChunks = [];
          ttsManagers[id].pendingTexts = [];
          ttsManagers[id]._muted = true;
          ttsManagers[id].callbackFired = true;
          ttsManagers[id]._resolveMyDone = null;
        }
      });

      // 发送 stop 并关闭所有连接
      Object.keys(connections).forEach(function(id) {
        if (connections[id] && connections[id].ws) {
          try { connections[id].ws.send(JSON.stringify({ type: 'stop' })); } catch(e) {}
          try { connections[id].ws.close(); } catch(e) {}
          connections[id].ws = null;
          connections[id].connected = false;
        }
      });

      // 立即发送打断请求
      fetch('/api/roundtable/user-input', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          input: content,
          targetAgent: agentId,
          channelId: currentChannel || null
        })
      }).catch(function() {});

      // 标记圆桌为活跃状态
      roundTableActive = true;

      // 之后重新连接
      Object.keys(connections).forEach(function(id) { initConnection(id); });

      input.value = '';
    }

    function addMessage(agentId, content, type) {
      var messagesDiv = document.getElementById('messages-' + agentId);

      // 避免重复显示 - 检查最后一条消息是否相同
      var lastMsg = messagesDiv.lastElementChild;
      if (lastMsg && lastMsg.textContent === content) {
        return;
      }

      var messageDiv = document.createElement('div');
      messageDiv.className = 'message ' + type;
      messageDiv.textContent = content;
      messagesDiv.appendChild(messageDiv);
      scrollToBottom(agentId);
    }

    function setLoading(agentId, loading) {
      var btn = document.getElementById('btn-' + agentId);
      btn.disabled = loading;
      btn.textContent = loading ? '...' : '发送';
    }

    function scrollToBottom(agentId) {
      var messagesDiv = document.getElementById('messages-' + agentId);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function clearChat(agentId) {
      var messagesDiv = document.getElementById('messages-' + agentId);
      if (messagesDiv) messagesDiv.innerHTML = '';
      messageHistory[agentId] = [];
    }

    function resetRoundtableRuntime() {
      roundTableActive = false;
      isSpeaking = false;
      currentSpeaker = null;
      prevSpeakerDone = Promise.resolve();
      userInterruptTarget = null;
      nextSpeakerPending = null;
      isInterrupted = false;
    }

    function clearAllAgentChats() {
      var agentIds = window.roomAgentIds || AGENT_IDS;
      agentIds.forEach(function(id) {
        clearChat(id);
        typingBuffers[id] = '';
        currentSpeechBuffers[id] = '';
        var input = document.getElementById('input-' + id);
        if (input) input.value = '';
        var btn = document.getElementById('btn-' + id);
        if (btn) {
          btn.disabled = false;
          btn.textContent = '发送';
        }
      });

    function waitForAgentConnections(timeoutMs) {
      var waitMs = typeof timeoutMs === 'number' ? timeoutMs : 8000;
      var agentIds = window.roomAgentIds || AGENT_IDS;

      agentIds.forEach(function(id) {
        ensureAgentRuntime(id);
        var ws = connections[id] && connections[id].ws;
        if (!ws || ws.readyState === WebSocket.CLOSED || ws.readyState === WebSocket.CLOSING) {
          initConnection(id);
        }
      });

      return new Promise(function(resolve) {
        var startedAt = Date.now();
        (function check() {
          var allReady = agentIds.every(function(id) {
            return connections[id] && connections[id].ws && connections[id].ws.readyState === WebSocket.OPEN;
          });
          if (allReady) return resolve(true);
          if (Date.now() - startedAt >= waitMs) return resolve(false);
          setTimeout(check, 200);
        })();
      });
    }

    // ========== 房间系统 ==========
    function createRoom(options) {
      options = options || {};
      var forceCreate = !!options.forceCreate;
      var showLangModal = options.showLangModal !== false;

      // 已有房间时复用当前 channel，不重复创建
      if (currentChannel && !forceCreate) {
        console.log('[Room] 复用现有房间开播:', currentChannel);
        applyRoundTableUiState(false, { keepCreateHidden: true });
        document.getElementById('lang-modal').style.display = 'block';
        return Promise.resolve({ reused: true, channelId: currentChannel });
      }

      if (roomCreatePromise) {
        console.log('[Room] 建房请求进行中，复用 in-flight 请求');
        return roomCreatePromise;
      }

      // 从 URL 参数获取 characters、voice_ids 和 room_id
      const urlParams = new URLSearchParams(window.location.search);
      const characters = urlParams.get('characters');
      const character_voices = urlParams.get('character_voices');
      const podcastRoomId = urlParams.get('room_id');
      const category = urlParams.get('category');

      const body = {};
      if (characters) {
        body.agentIds = characters.split(',').map(c => c.trim());
      }
      if (character_voices) {
        body.voiceIds = character_voices.split(',').map(v => v.trim());
      }
      if (podcastRoomId) {
        body.podcastRoomId = podcastRoomId;
        console.log('[Room] Podcast room_id:', podcastRoomId);
      }
      if (category) {
        body.category = category;
        console.log('[Room] Category:', category);
      }

      roomCreatePromise = fetch('/api/room/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        currentChannel = data.channelId;
        isHost = true;
        isAgent = false;

        // 保存 agents 配置
        window.roomAgentIds = data.agentIds;
        window.roomAgents = data.agents;

        const agentIds = window.roomAgentIds || AGENT_IDS;
        agentIds.forEach(function(id) { ensureAgentRuntime(id); });

        // 重新渲染面板
        renderAgentPanels();

        // 更新URL - 保留 room_id、characters、voice 参数
        var newParams = new URLSearchParams();
        newParams.set('channel', currentChannel);
        if (characters) newParams.set('characters', characters);
        if (character_voices) newParams.set('character_voices', character_voices);
        if (podcastRoomId) newParams.set('room_id', podcastRoomId);
        var newUrl = window.location.pathname + '?' + newParams.toString();
        window.history.pushState({ path: newUrl }, '', newUrl);

        // 重新建立WebSocket连接（带channel参数）
        agentIds.forEach(function(id) {
          if (connections[id] && connections[id].ws) {
            connections[id].ws.close();
          }
          initConnection(id);
        });

        // 显示语言选择浮窗（仅用户主动开播时）
        if (showLangModal) {
          applyRoundTableUiState(false, { keepCreateHidden: true });
          document.getElementById('lang-modal').style.display = 'block';
        } else {
          applyRoundTableUiState(false);
        }

        console.log('[Room] 创建房间成功:', currentChannel);
      })
      .catch(function(err) {
        console.error('[Room] 创建房间失败:', err);
        throw err;
      })
      .finally(function() {
        roomCreatePromise = null;
      });

      return roomCreatePromise;
    }

    function recoverMissingRoom(reason) {
      if (!currentChannel && roomCreatePromise) {
        console.log('[Room] 已触发建房恢复，等待完成: ' + reason);
        return roomCreatePromise;
      }
      if (roomRecoveryInFlight) {
        console.log('[Room] 自动恢复进行中，忽略重复触发: ' + reason);
        return roomCreatePromise || Promise.resolve();
      }
      var oldChannel = currentChannel;
      currentChannel = null;
      roomRecoveryInFlight = true;
      console.warn('[Room] 检测到房间不可用，自动恢复连接，old channel=' + (oldChannel || 'none') + ', reason=' + reason);
      return createRoom({ forceCreate: true, showLangModal: false })
        .catch(function(err) {
          console.error('[Room] 自动恢复失败:', err);
          throw err;
        })
        .finally(function() {
          roomRecoveryInFlight = false;
        });
    }

    function stopRoom() {
      if (!currentChannel) return;

      fetch('/api/room/' + currentChannel + '/leave', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
      })
      .then(function(res) { return res.json(); })
      .then(function() {
        // 保留 characters、character_voices、room_id 参数，只移除 channel
        var urlParams = new URLSearchParams(window.location.search);
        var characters = urlParams.get('characters');
        var character_voices = urlParams.get('character_voices');
        var roomId = urlParams.get('room_id');

        var newUrl = window.location.pathname;
        var params = new URLSearchParams();
        if (characters) params.set('characters', characters);
        if (character_voices) params.set('character_voices', character_voices);
        if (roomId) params.set('room_id', roomId);
        if (params.toString()) newUrl += '?' + params.toString();
        window.history.pushState({}, '', newUrl);

        // 重置状态
        currentChannel = null;
        isHost = true;
        isAgent = false;
        if (speakerPollingInterval) {
          clearInterval(speakerPollingInterval);
          speakerPollingInterval = null;
        }

        // 更新UI
        document.getElementById('btn-create-room').style.display = 'inline';
        document.getElementById('btn-stop-all').style.display = 'none';
        document.getElementById('btn-mute-toggle').style.display = 'none';
        // 重置静音状态和各 agent 音量
        localMuted = false;
        var agentIds = window.roomAgentIds || AGENT_IDS;
        for (var ai = 0; ai < agentIds.length; ai++) {
          var mgr = ttsManagers[agentIds[ai]];
          if (mgr && mgr.gainNode) {
            mgr.gainNode.gain.value = mgr.volumeGain;
          }
        }
        var muteBtn = document.getElementById('btn-mute-toggle');
        muteBtn.textContent = '播放+推流';
        muteBtn.style.background = '#238636';

        console.log('[Room] 房间已关闭');
      });
    }

    function joinRoomAsAgent(channelId) {
      console.log('[Room] 正在加入房间:', channelId);

      fetch('/api/room/' + channelId + '/join', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        console.log('[Room] 加入房间响应:', JSON.stringify(data));

        // 调试：检查 currentSpeaker
        console.log('[Room] currentSpeaker:', data.currentSpeaker);

        currentChannel = channelId;
        isAgent = true;
        isHost = false;

        // 保存 agents 配置
        window.roomAgentIds = data.agentIds || [];
        window.roomAgents = data.agents || {};

        // 重新渲染面板
        renderAgentPanels();

        // 更新UI
        var roomStatusEl = document.getElementById('room-status');
        if (roomStatusEl) {
          roomStatusEl.style.display = 'inline';
          roomStatusEl.textContent = '分机: ' + channelId;
          roomStatusEl.style.background = '#1f6feb';
          roomStatusEl.style.color = 'white';
        }

        console.log('[Room] 加入房间成功:', channelId);

        // 保存 speakerChain
        speakerChainCache = data.speakerChain || [];

        if (speakerChainCache.length > 0) {
          console.log('[Room] 历史发言链条:', speakerChainCache.length, '条');

          // 显示历史发言（不播放）
          restoreSpeakerChain(speakerChainCache);

          // 不设置 currentChainIndex，让轮询自己判断
          currentChainIndex = -1;
        }

        // 同步当前状态 - 播放当前发言人的音频
        // 使用 syncToSpeaker 播放（确保有防冲突检查）
        if (data.currentSpeaker) {
          lastPlayedSpeaker = data.currentSpeaker.agentId;
          currentChainIndex = speakerChainCache.length; // 从下一条开始
          syncToSpeaker(data.currentSpeaker);
          // scrollToAgent 已在 syncToSpeaker 的 loadAndPlay 后调用
        } else if (speakerChainCache.length > 0) {
          // 没有 currentSpeaker（当前没人说话），但有历史，播放最后一条
          var lastEntry = speakerChainCache[speakerChainCache.length - 1];
          console.log('[Room] 播放历史最后一条:', lastEntry.agentId);
          lastPlayedSpeaker = lastEntry.agentId;
          currentChainIndex = speakerChainCache.length - 1;

          // 直接获取音频播放
          fetch('/api/room/' + channelId + '/audio/' + lastEntry.agentId, {
            method: 'GET',
            headers: { 'Content-Type': 'application/json' }
          })
          .then(function(res) { return res.json(); })
          .then(function(audioData) {
            if (audioData.audioHex && audioData.audioHex.length > 0) {
              console.log('[Room] 播放历史音频:', lastEntry.agentId, 'hex长度:', audioData.audioHex.length);
              ttsManagers[lastEntry.agentId].loadAndPlay(audioData.audioHex, 0);
              // 移动端：音频开始播放时滚动到发言人的聊天界面
              setTimeout(function() { scrollToAgent(lastEntry.agentId); }, 300);
            }
          });
        }

        // 启动轮询
        startSpeakerPolling();
      })
      .catch(function(err) {
        console.error('[Room] 加入房间失败:', err);
        alert('加入房间失败: ' + err.message);
      });
    }

    // 分机模式：通过轮询同步主机状态
    // ==============================

    var lastSyncedSpeaker = null; // 上次同步的发言者
    var lastPlayedSpeaker = null; // 上次播放音频的发言者
    var speakerChainCache = []; // 缓存 speakerChain
    var currentChainIndex = 0; // 当前播放到第几条

    function startSpeakerPolling() {
      if (speakerPollingInterval) {
        clearInterval(speakerPollingInterval);
      }

      // 每1秒轮询获取当前状态
      speakerPollingInterval = setInterval(function() {
        if (!currentChannel || !isAgent) return;

        fetch('/api/room/' + currentChannel + '/state', {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' }
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          if (!data.isActive) return;
          logServerStuckDiagnostics(data.stuckDiagnostics, 'room_state_poll');

          // 获取当前发言人
          var currentSpeakerId = data.currentSpeaker ? data.currentSpeaker.agentId : null;
          console.log('[Room] 轮询: currentSpeaker=', currentSpeakerId, 'lastPlayedSpeaker=', lastPlayedSpeaker);

          // 如果有当前发言人且不是正在播放的，尝试播放
          if (currentSpeakerId && currentSpeakerId !== lastPlayedSpeaker) {
            // 检查是否已经在播放
            var mgr = ttsManagers[currentSpeakerId];
            if (mgr && !mgr.isPlaying) {
              console.log('[Room] 播放当前发言人:', currentSpeakerId);
              lastPlayedSpeaker = currentSpeakerId;
              syncToSpeaker(data.currentSpeaker);
              // scrollToAgent 已在 syncToSpeaker 的 loadAndPlay 后调用
            }
          }
        })
        .catch(function(err) {
          console.error('[Room] 轮询失败:', err);
        });
      }, 1000);
    }

    // 恢复历史发言（分机刷新后调用）
    function restoreSpeakerChain(chain) {
      console.log('[Room] 恢复历史发言链条, 共', chain.length, '条');

      chain.forEach(function(entry, index) {
        var agentId = entry.agentId;
        var text = entry.text;

        if (!text) return;

        console.log('[Room] 恢复发言:', agentId, '内容:', text.substring(0, 30));

        // 显示 agent 回复（不加前缀，和主机一致）
        addMessage(agentId, text, 'assistant');

    function syncToSpeaker(speakerData) {
      if (!speakerData || !speakerData.agentId) {
        console.log('[Room] syncToSpeaker 跳过: 无 speakerData');
        return;
      }
      if (!roundTableActive) {
        console.log('[Room] syncToSpeaker 跳过: 当前非开播状态');
        return;
      }

      var agentId = speakerData.agentId;
      console.log('[Room] syncToSpeaker 播放:', agentId);

      // 获取完整音频缓存
      fetch('/api/room/' + currentChannel + '/audio/' + agentId, {
        method: 'GET',
        headers: { 'Content-Type': 'application/json' }
      })
      .then(function(res) { return res.json(); })
      .then(function(audioData) {
        if (!roundTableActive) {
          console.log('[Room] 音频返回后跳过播放: 当前已下播');
          return;
        }
        console.log('[Room] 音频数据:', JSON.stringify(audioData));

        if (audioData.error) {
          console.log('[Room] 音频不存在:', audioData.error);
          return;
        }

        var mgr = ttsManagers[agentId];

        // 不在这里显示文本 - 文本已经通过 WebSocket text_sync 消息显示了
        // 只处理音频播放

        // 播放音频（如果有完整缓存）
        if (audioData.audioHex && audioData.audioHex.length > 0) {
          console.log('[Room] 音频长度:', audioData.audioHex.length);

          // 只有当音频有足够数据时才播放（至少1000个hex字符，约500字节）
          if (audioData.audioHex.length < 1000) {
            console.log('[Room] 音频数据不足，跳过播放');
            return;
          }

          // 使用服务端返回的已过去时间
          var elapsed = audioData.elapsed || 0;

          // 如果音频已播放完（超过时长2秒以上），跳过
          var estimatedDuration = audioData.audioHex.length / 100; // 粗略估算
          if (elapsed > estimatedDuration + 2000) {
            console.log('[Room] 音频已播放完，跳过');
            return;
          }

          console.log('[Room] 播放音频:', agentId, '已过去:', elapsed, 'ms');

          // 播放
          mgr.loadAndPlay(audioData.audioHex, elapsed);

          // 移动端：音频开始播放时滚动到发言人的聊天界面
          setTimeout(function() { scrollToAgent(agentId); }, 300);
        } else {
          console.log('[Room] 无音频数据');
        }
      })
      .catch(function(err) {
        console.error('[Room] 获取音频失败:', err);
      });
    }

    // 更新麦序话题列表
    function updateQueueBar(topics) {
      var queueBar = document.getElementById('queue-bar');
      var queueScroll = document.getElementById('queue-scroll');
      if (!topics || topics.length === 0) {
        queueBar.style.display = 'none';
        return;
      }
      queueScroll.innerHTML = '';
      var hasWaiting = false;
      topics.forEach(function(topic) {
        if (topic.status !== 'waiting') return;
        hasWaiting = true;
        var item = document.createElement('div');
        item.className = 'queue-item';
        item.setAttribute('data-queue-id', topic.queue_id);
        var img = document.createElement('img');
        img.src = topic.cover_url || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="%23238636"/><stop offset="100%" stop-color="%231f6feb"/></linearGradient></defs><rect fill="url(%23g)" width="40" height="40" rx="20"/><path d="M13 14h14v2H13zm0 5h10v2H13zm0 5h14v2H13z" fill="white" opacity="0.9"/></svg>';
        item.appendChild(img);
        var label = document.createElement('div');
        label.className = 'queue-label';
        var title = topic.question || topic.title || '话题';
        label.textContent = title.length > 15 ? title.substring(0, 15) + '...' : title;
        item.appendChild(label);
        // 角标占位
        var badge = document.createElement('div');
        badge.className = 'queue-badge';
        item.appendChild(badge);
        // URL：优先 url 字段，然后从 content/question/title 提取
        var topicUrl = topic.url || null;
        if (!topicUrl) {
          var fields = [topic.content, topic.question, topic.title];
          for (var fi = 0; fi < fields.length; fi++) {
            var m = (fields[fi] || '').match(/https?:\/\/[^\s)}\]]+/);
            if (m) { topicUrl = m[0]; break; }
          }
        }
        item.onclick = function() {
          if (topicUrl) {
            window.open(topicUrl, '_blank');
          }
        };
        queueScroll.appendChild(item);
      });
      queueBar.style.display = hasWaiting ? 'block' : 'none';
      // 恢复已知的角标状态
      topics.forEach(function(topic) {
        var state = queueBadgeStates[topic.queue_id];
        if (state) {
          updateQueueItemBadge(topic.queue_id, state.status, state.savedPath, state.crawlError);
        }
      });
    }

    // 更新麦序话题角标
    function updateQueueItemBadge(queueId, status, savedPath, crawlError) {
      // 缓存角标状态，防止 updateQueueBar 重渲染后丢失
      queueBadgeStates[queueId] = {
        status: status,
        savedPath: savedPath || '',
        crawlError: crawlError || ''
      };
      var item = document.querySelector('.queue-item[data-queue-id="' + queueId + '"]');
      if (!item) return;
      var badge = item.querySelector('.queue-badge');
      if (!badge) return;
      badge.className = 'queue-badge';
      badge.textContent = '';
      badge.onclick = null;
      badge.style.cursor = 'default';
      badge.title = '';
      if (status === 'crawling') {
        badge.classList.add('crawling');
        badge.textContent = '⏳';
      } else if (status === 'ready') {
        badge.classList.add('ready');
        badge.textContent = '✓';
        badge.style.cursor = 'pointer';
        badge.title = savedPath ? ('已保存: ' + savedPath) : '已抓取，但未返回保存地址';
        badge.onclick = function(e) {
          e.stopPropagation();
          if (savedPath) {
            showQueuePathTip('💾 ' + savedPath, '#58a6ff');
          } else {
            showQueuePathTip('⚠️ 已抓取，但未返回保存地址（可能命中旧缓存）', '#f2cc60');
          }
        };
      } else if (status === 'failed') {
        badge.classList.add('failed');
        badge.textContent = '!';
        badge.style.cursor = 'pointer';
        badge.title = '抓取未完成，点击查看详情';
        badge.onclick = function(e) {
          e.stopPropagation();
          var detail = crawlError ? ('，原因: ' + crawlError) : '';
          if (savedPath) {
            showQueuePathTip('⚠️ 抓取未完成（缺少 post.json）: ' + savedPath + detail, '#ff7b72');
          } else {
            showQueuePathTip('⚠️ 抓取未完成（缺少 post.json）' + detail, '#ff7b72');
          }
        };
      }
    }

    // ========== 单智能体音量控制 ==========
    function setAgentVolume(agentId, sliderValue) {

      var mgr = ttsManagers[agentId];
      if (mgr) {

    function closeLangModal() {

    function selectLangAndStart(lang) {
      document.getElementById('lang-modal').style.display = 'none';
      lastSelectedLang = lang || lastSelectedLang || 'zh';
      startModerator(lang, { source: 'manual_click' });
    }

    function startModerator(lang, options) {
      options = options || {};
      var source = options.source || 'manual_click';
      if (roundTableActive) {
        var activeNow = checkRoundTableActive();
        if (!activeNow) {
          roundTableActive = false;
        } else {
          console.log('[RoundTable] 忽略开播：当前已在开播状态');
          document.getElementById('rt-status').textContent = '已在讨论中';
          return Promise.resolve(false);
        }
      }
      if (moderatorStartInFlight) {
        console.log('[RoundTable] 忽略开播：已有开播流程进行中');
        document.getElementById('rt-status').textContent = '正在开播中...';
        return Promise.resolve(false);
      }
      moderatorStartInFlight = true;
      lang = lang || lastSelectedLang || 'zh';
      lastSelectedLang = lang;

      // 每轮开播前先强制清理本地残留音频/TTS连接，避免占用 MiniMax 连接额度
      hardStopLocalAudioAndTTS();
      // 再重置残留状态，避免上一轮未完成 Promise 卡住首发
      resetRoundtableRuntime();
      clearAllAgentChats();
      var createBtn = document.getElementById('btn-create-room');
      createBtn.disabled = true;

      var connectingText = lang === 'en' ? 'Connecting agents...' : '连接智能体中...';
      document.getElementById('rt-status').textContent = connectingText;

      var body = { lang: lang };
      if (currentChannel) {
        body.channelId = currentChannel;
      }
      body.source = source;

      return waitForAgentConnections(8000)
        .then(function(allReady) {
          if (!allReady) {
            console.warn('[RoundTable] ⚠️ 部分智能体连接未就绪，继续尝试开播');
          }
          return fetch('/api/roundtable/random', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
        })
        .then(function(res) {
          return res.json().then(function(data) {
            if (!res.ok || data.success === false) {
              var err = new Error((data && (data.error || data.message)) || ('start_failed_' + res.status));
              err.roomMissing = !!(data && data.roomMissing);
              throw err;
            }
            return data;
          });
        })
        .then(function() {
          // 移动端：滚动到第一个发言人
          if (window.innerWidth <= 768) {
            var agentIds = window.roomAgentIds || AGENT_IDS;
            if (agentIds.length > 0) {
              scrollToAgent(agentIds[0]);
            }
          }

          var statusText = lang === 'en' ? 'Live: random topic...' : '讨论中: 随机话题...';
          roundtableStartedAtMs = Date.now();
          applyRoundTableUiState(true, { updateStatus: true, statusText: statusText });
          // 获取当前话题
          pollCurrentTopic();
        })
        .catch(function(err) {
          resetRoundtableRuntime();
          var msg = err && err.message ? err.message : '开播失败';
          document.getElementById('rt-status').textContent = '开播失败: ' + msg;
          console.error('[RoundTable] 开播失败:', err);
          if (err && err.roomMissing && currentChannel) {
            console.warn('[RoundTable] 房间丢失，自动重建');
            recoverMissingRoom('start_roundtable_room_missing');
          }
        })
        .finally(function() {
          createBtn.disabled = false;
          moderatorStartInFlight = false;
        });
    }

    function hardStopLocalAudioAndTTS() {
      // 立刻停止所有正在播放的音频，关闭 TTS WebSocket，关闭 AudioContext，彻底重置
      Object.keys(ttsManagers).forEach(function(id) {
        var mgr = ttsManagers[id];
        mgr.stopPlayback();
        mgr.audioChunks = [];
        // 停播后先保持静音，防止晚到音频包把播放再次拉起；新一轮开播会自动解除
        mgr._muted = true;
        if (mgr.ws) {
          try { mgr.ws.close(); } catch(e) {}
          mgr.ws = null;
          mgr.isOpen = false;
        }
        if (mgr.audioContext) {
          try { mgr.audioContext.close(); } catch(e) {}
          mgr.audioContext = null;
        }
        // 重置播放状态
        mgr.activeSources = 0;
        mgr.activeSrcList = [];
        mgr.firstPlay = true;
        mgr.audioStarted = false;
        mgr.taskFinished = false;
        mgr.callbackFired = false;
        mgr.textComplete = false;
        mgr.endSignalSent = false;
        mgr.playQueue = Promise.resolve();
      });
      window._allGainNodes = [];
    }

    // 统一的停止：仅下播，不关闭房间（保持 room 长连接）
    function stopAll(options) {
      options = options || {};
      var force = !!options.force;

      if (!force && !roundTableActive) {
        console.log('[RoundTable] 忽略下播：当前已是下播状态');
        return Promise.resolve(false);
      }
      if (moderatorStopInFlight) {
        // 强制停播场景仍要立刻停本地音频，避免“状态在停播中但声音还在响”
        if (force) {
          hardStopLocalAudioAndTTS();
          applyRoundTableUiState(false, { updateStatus: true, statusText: '已下播（强制停止）' });
        } else {
          console.log('[RoundTable] 忽略下播：已有下播流程进行中');
        }
        return Promise.resolve(false);
      }
      moderatorStopInFlight = true;

      // 下播立即清空每个主播聊天框，下一次开播从干净状态开始
      clearAllAgentChats();
      resetRoundtableRuntime();
      hardStopLocalAudioAndTTS();
      roundtableStartedAtMs = 0;

      var body = {};
      if (currentChannel) {
        body.channelId = currentChannel;
      }
      body.source = options.source || 'manual_click';

      // 1. 停止圆桌讨论
      return fetch('/api/roundtable/stop', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      })
        .then(function() {
          resetRoundtableRuntime();
          applyRoundTableUiState(false, { updateStatus: true, statusText: '已下播（房间连接保持）' });
          document.getElementById('topic-bar').style.display = 'none';
          console.log('[RoundTable] 已停止');
        })
        .catch(function(err) {
          console.error('[RoundTable] 下播失败:', err);
          // 本地已强制停音频，后端失败时也应保持下播 UI，避免误导
          applyRoundTableUiState(false, { updateStatus: true, statusText: '下播失败（本地已停）' });
        })
        .finally(function() {
          moderatorStopInFlight = false;
        });
    }

    function stopRoundTable() {
      stopAll();
    }

    window.onload = function() {
      // 进入页面即尝试自动建房（不等待 agents 配置加载）
      var bootParams = new URLSearchParams(window.location.search);
      var hasRoomId = !!bootParams.get('room_id');
      var shouldAutoCreateRoom = !currentChannel && hasRoomId;

      if (shouldAutoCreateRoom) {
        console.log('[Room] 检测到 room_id 且无 channel，自动创建房间并预连接');
        createRoom({ forceCreate: true, showLangModal: false }).catch(function() {
          // 自动建房失败时短暂重试，避免首包失败导致无连接
          setTimeout(function() {
            if (!currentChannel) {
              console.warn('[Room] 自动创建房间重试一次');
              createRoom({ forceCreate: true, showLangModal: false }).catch(function() {});
            }
          }, 1500);
        });
      }

      // 等待 agents 配置加载完成（失败时降级）
      Promise.resolve(agentsConfigPromise).catch(function(err) {
        console.warn('[Room] agents 配置加载失败，使用当前参数继续初始化:', err && err.message ? err.message : err);
        const fallbackIds = (window.roomCharacters && window.roomCharacters.length > 0)
          ? window.roomCharacters
          : AGENT_IDS;
        window.roomAgentIds = fallbackIds;
        fallbackIds.forEach(function(id) { ensureAgentRuntime(id); });
        renderAgentPanels();
      }).then(function() {
        initStatusBar();

        if (!shouldAutoCreateRoom) {
          // 使用 roomAgentIds 或默认
          const agentIds = window.roomAgentIds || AGENT_IDS;
          agentIds.forEach(function(id) { initConnection(id); });
        }

        // 如果带 channel 参数，获取房间配置
        if (currentChannel) {
          fetch('/api/room/' + currentChannel + '/join', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
          })
          .then(function(res) {
            if (!res.ok) {
              return res.json().then(function(err) {
                throw new Error((err && err.error) || ('join_failed_' + res.status));
              }).catch(function() {
                throw new Error('join_failed_' + res.status);
              });
            }
            return res.json();
          })
          .then(function(data) {
            if (data.agentIds) {
              window.roomAgentIds = data.agentIds;
              window.roomAgents = data.agents || {};
              renderAgentPanels();
              console.log('[Room] 房间配置已加载:', data.agentIds);
            }
          })
          .catch(function(err) {
            console.warn('[Room] 获取房间配置失败:', err.message);
            // 常见于服务刚重启导致内存房间丢失：自动重建房间连接
            recoverMissingRoom('join_failed');
          });
        }

        // 检查圆桌状态
        var statusUrl = '/api/roundtable/status';
        if (currentChannel) {
          statusUrl += '?channelId=' + encodeURIComponent(currentChannel);
        }
        fetch(statusUrl)
          .then(function(res) { return res.json(); })
          .then(function(data) {
            applyRoundTableUiState(data.isActive, {
              updateStatus: true,
              statusText: data.isActive ? '讨论中' : '已下播（房间连接保持）'
            });
            logServerStuckDiagnostics(data.stuckDiagnostics, 'roundtable_status_boot');
            if (data.roomMissing && currentChannel) {
              console.warn('[RoundTable] 状态检测发现房间丢失，自动重建');
              recoverMissingRoom('status_boot_room_missing');
              return;
            }
            console.log('[RoundTable] 状态同步: isActive=' + data.isActive + ', roundTableActive=' + roundTableActive);
          });

        // 定期同步圆桌状态（每2秒）
        setInterval(function() {
          var pollUrl = '/api/roundtable/status';
          if (currentChannel) {
            pollUrl += '?channelId=' + encodeURIComponent(currentChannel);
          }
          fetch(pollUrl)
            .then(function(res) { return res.json(); })
            .then(function(data) {
              logServerStuckDiagnostics(data.stuckDiagnostics, 'roundtable_status_poll');
              if (data.roomMissing && currentChannel) {
                console.warn('[RoundTable] 轮询发现房间丢失，自动重建');
                recoverMissingRoom('status_poll_room_missing');
                return;
              }
              var wasActive = roundTableActive;
              // 开播/下播流程进行中时，不用轮询状态覆盖按钮，避免出现双按钮闪烁
              if (!moderatorStartInFlight && !moderatorStopInFlight) {
                applyRoundTableUiState(data.isActive, { updateStatus: wasActive !== data.isActive });
              }
              if (wasActive !== roundTableActive) {
                console.log('[RoundTable] 状态变化: ' + wasActive + ' -> ' + roundTableActive);
              }
            });
        }, 2000);

        // 卡住诊断：周期打印本地阻塞链路状态（低频、带去重）
        setInterval(function() {
          try { logLocalStuckDiagnostics(); } catch (e) {}
        }, 3000);

        // 移动端滑动导航
        initMobileNavigation();
      });
    };
    
    // 移动端导航初始化
    function initMobileNavigation() {
      var gridContainer = document.querySelector('.grid-container');
      var navDots = document.querySelectorAll('.mobile-nav-dot');
      
      if (!gridContainer || navDots.length === 0) return;
      
      // 监听滚动更新导航点
      var scrollTimeout;
      gridContainer.addEventListener('scroll', function() {
        if (scrollTimeout) clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(function() {
          updateMobileNavDots();
        }, 50);
      }, { passive: true });
      
      // 点击导航点切换面板
      navDots.forEach(function(dot, index) {
        dot.addEventListener('click', function() {
          var panelWidth = window.innerWidth;
          // 横屏手机显示2个面板
          if (window.innerWidth <= 768 && window.innerHeight < window.innerWidth) {
            panelWidth = window.innerWidth / 2;
          }
          gridContainer.scrollTo({
            left: panelWidth * index,
            behavior: 'smooth'
          });
        });
      });
      
      // 初始更新
      updateMobileNavDots();
    }
    
    // 更新导航点状态
    function updateMobileNavDots() {
      var gridContainer = document.querySelector('.grid-container');
      var navDots = document.querySelectorAll('.mobile-nav-dot');
      if (!gridContainer || navDots.length === 0) return;
      
      var scrollLeft = gridContainer.scrollLeft;
      var panelWidth = window.innerWidth;
      // 横屏手机显示2个面板
      if (window.innerWidth <= 768 && window.innerHeight < window.innerWidth) {
        panelWidth = window.innerWidth / 2;
      }
      
      var currentIndex = Math.round(scrollLeft / panelWidth);
      currentIndex = Math.max(0, Math.min(currentIndex, navDots.length - 1));
      
      navDots.forEach(function(dot, index) {
        dot.classList.remove('active', 'current');
        if (index === currentIndex) {
          dot.classList.add('current');
        } else if (index < currentIndex) {
          dot.classList.add('active');
        }
      });
    }
    
    // 移动端滚动到指定智能体
    function scrollToAgent(agentId) {
      // 只在移动端执行
      if (window.innerWidth > 768) return;

      const agentIds = window.roomAgentIds || AGENT_IDS;
      var index = agentIds.indexOf(agentId);
      if (index === -1) return;
      
      var gridContainer = document.querySelector('.grid-container');
      if (!gridContainer) return;
      
      var panelWidth = window.innerWidth;
      // 横屏手机显示2个面板
      if (window.innerWidth <= 768 && window.innerHeight < window.innerWidth) {
        panelWidth = window.innerWidth / 2;
      }
      
      // 使用 smooth 滚动，但如果距离太远则直接跳转
      var targetScroll = panelWidth * index;
      var currentScroll = gridContainer.scrollLeft;
      var distance = Math.abs(targetScroll - currentScroll);
      
      gridContainer.scrollTo({
        left: targetScroll,
        behavior: distance > panelWidth * 2 ? 'auto' : 'smooth'
      });
      
      // 更新导航点
      setTimeout(updateMobileNavDots, 100);
    }
    
    // 移动端：等待前一个人音频播完后再切换的面板切换逻辑
    var pendingScrollAgent = null; // 记录等待切换到的目标
    
    // 标记下一位发言人（在 moderator 消息到达时调用）
    function markNextSpeaker(agentId) {
      if (window.innerWidth > 768) return; // 只在移动端
      pendingScrollAgent = agentId;
      console.log('[Mobile] 标记下一位发言人: ' + agentId + '，等待当前音频播完后再切换');
    }
    
    // 执行待处理的面板切换（在当前音频播完时调用）
    function executePendingScroll() {
      if (window.innerWidth > 768) return; // 只在移动端
      if (pendingScrollAgent) {
        console.log('[Mobile] 前一位音频播完，切换到: ' + pendingScrollAgent);
        scrollToAgent(pendingScrollAgent);
        pendingScrollAgent = null;
      }
    }

    window.onbeforeunload = function() {
      AGENT_IDS.forEach(function(id) {
        if (connections[id].ws) connections[id].ws.close();
      });
      Object.keys(ttsManagers || {}).forEach(function(id) {
        var mgr = ttsManagers[id];
        if (!mgr) return;
        if (mgr.clearReconnectTimer) mgr.clearReconnectTimer();
        if (mgr.ws) {
          try { mgr.ws.close(); } catch (e) {}
          mgr.ws = null;
        }
      });
    };
  </script>
</body>
</html>
