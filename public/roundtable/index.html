<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圆桌会议</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0c10;
      color: #c9d1d9;
      height: 100vh;
      height: 100dvh; /* 动态视口高度，适配移动端地址栏 */
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: #161b22;
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    .header h1 { font-size: 14px; color: #58a6ff; white-space: nowrap; }
    .header-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .status { display: flex; gap: 12px; font-size: 11px; }
    .status-item { display: flex; align-items: center; gap: 4px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #238636; }
    .status-dot.disconnected { background: #da3633; }
    .topic-bar {
      background: #161b22;
      padding: 8px 12px;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    .topic-card {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      cursor: pointer;
    }
    .topic-card:active { opacity: 0.8; }
    .topic-cover {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      object-fit: cover;
      background: #30363d;
      flex-shrink: 0;
    }
    .topic-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .topic-title {
      color: #e6edf3;
      font-size: 13px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.3;
    }
    .topic-source {
      color: #8b949e;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .topic-source .icon { font-size: 12px; }
    .queue-bar {
      background: #161b22;
      padding: 6px 12px;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    .queue-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .queue-scroll::-webkit-scrollbar { display: none; }
    .queue-item {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      flex-shrink: 0;
      padding: 2px 10px 2px 2px;
      border-radius: 20px;
      background: #21262d;
    }
    .queue-item:active { opacity: 0.8; }
    .queue-item img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #30363d;
      flex-shrink: 0;
    }
    .queue-item .queue-label {
      color: #c9d1d9;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 160px;
      line-height: 32px;
    }
    .queue-item .queue-badge {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      margin-left: -2px;
    }
    .queue-badge.crawling {
      animation: pulse 1.2s ease-in-out infinite;
    }
    .queue-badge.ready {
      background: #238636;
    }
    .queue-badge.failed {
      background: #da3633;
      color: #ffffff;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .grid-container {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 8px;
      padding: 8px;
      overflow: hidden;
    }
    .panel {
      display: flex;
      flex-direction: column;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
      min-height: 0;
    }
    .panel-header {
      background: #21262d;
      padding: 6px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    .panel-title { font-weight: 600; font-size: 12px; display: flex; align-items: center; gap: 6px; }
    .panel-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; overflow: hidden; background: #30363d; }
    .panel-icon.main { background: #238636; }
    .panel-icon.jobs { background: #8957e5; }
    .panel-icon.kobe { background: #f97316; }
    .panel-icon.munger { background: #22c55e; }
    .panel-icon.hawking { background: #3b82f6; }
    .panel-icon.gates { background: #06b6d4; }
    .panel-icon img { width: 100%; height: 100%; object-fit: cover; }
    .panel-model { font-size: 9px; color: #8b949e; }
    .panel-actions { display: flex; gap: 2px; }
    .btn-icon {
      background: #30363d; border: none; color: #c9d1d9;
      cursor: pointer; padding: 2px 6px; border-radius: 4px; font-size: 10px;
      touch-action: manipulation;
    }
    .btn-icon:hover { background: #484f58; }
    .btn-icon:active { background: #3d444d; }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 11px;
      line-height: 1.5;
    }
    .message { max-width: 95%; padding: 6px 10px; border-radius: 10px; white-space: pre-wrap; word-break: break-word; }
    .message.user { align-self: flex-end; background: #1f6feb; color: #fff; border-bottom-right-radius: 3px; }
    .message.assistant { align-self: flex-start; background: #21262d; border: 1px solid #30363d; border-bottom-left-radius: 3px; }
    .message.system { align-self: center; background: transparent; color: #8b949e; font-size: 9px; padding: 2px 8px; }
    .message.error { align-self: center; background: #da3633; color: #fff; font-size: 10px; }
    .input-area { background: #21262d; padding: 6px 8px; border-top: 1px solid #30363d; flex-shrink: 0; }
    .input-wrapper { display: flex; gap: 4px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 2px; }
    .input-wrapper input { flex: 1; background: transparent; border: none; padding: 4px 8px; color: #c9d1d9; font-size: 11px; outline: none; }
    .btn-send { background: #238636; border: none; color: #fff; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; touch-action: manipulation; }
    .btn-send:hover { background: #2ea043; }
    .btn-send:active { background: #1f6feb; }
    .btn-send:disabled { background: #484f58; cursor: not-allowed; }
    .typing-cursor { display: inline-block; width: 2px; height: 1em; background: #58a6ff; margin-left: 2px; animation: blink 1s infinite; vertical-align: text-bottom; }
    @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }
    .tts-indicator { display: inline-flex; align-items: center; gap: 2px; margin-left: 6px; font-size: 10px; color: #58a6ff; }
    .volume-control {
      display: flex;
      align-items: center;
      gap: 3px;
      margin-left: auto;
      margin-right: 6px;
    }
    .volume-icon { font-size: 10px; cursor: default; user-select: none; }
    .volume-slider {
      width: 50px;
      height: 3px;
      -webkit-appearance: none;
      appearance: none;
      background: #30363d;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      accent-color: #58a6ff;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #58a6ff;
      cursor: pointer;
    }
    .volume-slider::-moz-range-thumb {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #58a6ff;
      cursor: pointer;
      border: none;
    }
    .volume-value { font-size: 9px; color: #8b949e; min-width: 28px; text-align: right; }

    /* ========== 平板适配 (768px - 1024px) ========== */
    @media (max-width: 1024px) {
      .grid-container {
        gap: 6px;
        padding: 6px;
      }
      .panel-header {
        padding: 5px 8px;
      }
      .panel-title {
        font-size: 11px;
      }
      .panel-icon {
        width: 20px;
        height: 20px;
        font-size: 11px;
      }
      .messages {
        font-size: 10px;
        padding: 6px;
      }
    }

    /* ========== 手机适配 (< 768px) ========== */
    @media (max-width: 768px) {
      .header {
        padding: 10px 12px;
        flex-direction: column;
        gap: 8px;
        align-items: stretch;
      }
      .header h1 {
        font-size: 16px;
        text-align: center;
      }
      .header-controls {
        justify-content: center;
        gap: 6px;
      }
      .status {
        display: none; /* 手机端隐藏状态指示器，节省空间 */
      }
      #rt-status {
        display: none; /* 手机端隐藏讨论状态文字 */
      }
      .topic-bar {
        padding: 8px 10px;
      }
      .topic-cover {
        width: 40px;
        height: 40px;
      }
      .topic-title {
        font-size: 12px;
      }
      .topic-source {
        font-size: 10px;
      }
      .queue-bar {
        padding: 4px 10px;
      }
      .queue-item img {
        width: 28px;
        height: 28px;
      }
      .queue-item .queue-label {
        font-size: 11px;
        max-width: 64px;
        line-height: 28px;
      }
      .grid-container {
        display: flex;
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
        gap: 0;
        padding: 0;
        padding-bottom: env(safe-area-inset-bottom, 0px);
        scroll-behavior: smooth;
      }
      .panel {
        flex: 0 0 100vw;
        width: 100vw;
        height: 100%;
        scroll-snap-align: start;
        border-radius: 0;
        border-left: none;
        border-right: none;
      }
      .panel-header {
        padding: 10px 12px;
      }
      .panel-title {
        font-size: 14px;
      }
      .panel-icon {
        width: 28px;
        height: 28px;
        font-size: 14px;
      }
      .panel-model {
        font-size: 11px;
      }
      .volume-slider { width: 70px; }
      .volume-value { font-size: 11px; }
      .btn-icon {
        padding: 6px 10px;
        font-size: 12px;
        min-width: 32px;
        min-height: 32px;
      }
      .messages {
        font-size: 14px;
        padding: 12px;
        gap: 10px;
      }
      .message {
        padding: 10px 14px;
        max-width: 90%;
      }
      .input-area {
        padding: 10px 12px;
        padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px)); /* 适配 iOS 安全区域 */
      }
      .input-wrapper input {
        padding: 10px 12px;
        font-size: 16px; /* 防止 iOS 缩放 */
      }
      .btn-send {
        padding: 10px 16px;
        font-size: 14px;
        min-width: 60px;
        min-height: 40px;
      }
      /* 添加滑动指示器 */
      .mobile-nav-hint {
        display: flex;
        justify-content: center;
        gap: 8px;
        padding: 8px;
        background: #161b22;
        border-top: 1px solid #30363d;
      }
      .mobile-nav-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #30363d;
        transition: background 0.3s;
      }
      .mobile-nav-dot.active {
        background: #58a6ff;
      }
      .mobile-nav-dot.current {
        background: #238636;
      }
    }

    /* 桌面端隐藏手机导航 */
    @media (min-width: 769px) {
      .mobile-nav-hint {
        display: none !important;
      }
    }

    /* 横屏手机适配 */
    @media (max-width: 768px) and (orientation: landscape) {
      .panel {
        flex: 0 0 50vw;
        width: 50vw;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎯 圆桌会议</h1>
    <div class="header-controls">
      <div class="status" id="status-bar"></div>

      <!-- 房间控制 -->
      <div id="room-controls" style="display:flex;gap:8px;align-items:center;">
        <button id="btn-create-room" onclick="createRoom()" style="padding:4px 10px;background:#8957e5;border:none;border-radius:4px;color:white;font-size:11px;cursor:pointer;white-space:nowrap;">开播</button>
        <button id="btn-stop-all" onclick="stopAll()" style="display:none;padding:4px 10px;background:#da3633;border:none;border-radius:4px;color:white;font-size:11px;cursor:pointer;white-space:nowrap;">Stop</button>
        <button id="btn-mute-toggle" onclick="toggleMute()" style="display:none;padding:4px 10px;background:#238636;border:none;border-radius:4px;color:white;font-size:11px;cursor:pointer;white-space:nowrap;">播放+推流</button>
        <span id="rt-status" style="font-size:11px;color:#8b949e;white-space:nowrap;"></span>
      </div>

      <!-- 语言选择浮窗 -->
      <div id="lang-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;">
        <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);" onclick="closeLangModal()"></div>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#161b22;border:1px solid #30363d;border-radius:12px;padding:32px 40px;display:flex;flex-direction:column;align-items:center;gap:20px;box-shadow:0 8px 32px rgba(0,0,0,0.4);">
          <div style="font-size:14px;color:#e6edf3;font-weight:500;">选择讨论语言</div>
          <div style="display:flex;gap:16px;">
            <button onclick="selectLangAndStart('zh')" style="padding:10px 28px;background:#238636;border:none;border-radius:8px;color:white;font-size:14px;cursor:pointer;font-weight:500;transition:opacity 0.2s;" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">中文 Play</button>
            <button onclick="selectLangAndStart('en')" style="padding:10px 28px;background:#1f6feb;border:none;border-radius:8px;color:white;font-size:14px;cursor:pointer;font-weight:500;transition:opacity 0.2s;" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">EN Play</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 当前话题栏 -->
  <div class="topic-bar" id="topic-bar" style="display: none;">
    <a class="topic-card" id="topic-card" href="#" target="_blank">
      <img class="topic-cover" id="topic-cover" src="" alt="封面">
      <div class="topic-info">
        <div class="topic-title" id="topic-title"></div>
        <div class="topic-source" id="topic-source"></div>
      </div>
    </a>
  </div>

  <!-- 麦序话题列表 -->
  <div class="queue-bar" id="queue-bar" style="display: none;">
    <div class="queue-scroll" id="queue-scroll">
      <!-- 动态生成 -->
    </div>
  </div>

  <div class="grid-container" id="grid-container">
    <!-- 动态生成agent面板 -->
  </div>

  <!-- 移动端导航指示器 -->
  <div class="mobile-nav-hint" id="mobile-nav">
    <div class="mobile-nav-dot active" data-agent="jobs"></div>
    <div class="mobile-nav-dot" data-agent="kobe"></div>
    <div class="mobile-nav-dot" data-agent="munger"></div>
    <div class="mobile-nav-dot" data-agent="hawking"></div>
    <div class="mobile-nav-dot" data-agent="gates"></div>
  </div>

  <script>
    // === 高性能 hex 解码（查表法，避免逐字节 parseInt 阻塞主线程）===
    var NIBBLE = new Int8Array(128);
    NIBBLE.fill(0);
    for (var _i = 0; _i < 10; _i++) NIBBLE[48 + _i] = _i;       // '0'-'9'
    for (var _i = 0; _i < 6; _i++) { NIBBLE[97 + _i] = 10 + _i; NIBBLE[65 + _i] = 10 + _i; } // 'a'-'f','A'-'F'

    function hexToBytes(hex) {
      var len = hex.length >> 1;
      var bytes = new Uint8Array(len);
      for (var i = 0; i < len; i++) {
        bytes[i] = (NIBBLE[hex.charCodeAt(i * 2)] << 4) | NIBBLE[hex.charCodeAt(i * 2 + 1)];
      }
      return bytes;
    }

    const EXPRESSIVE_TTS_CUE_RE = /\((laughs|chuckle|coughs|clear-throat|groans|breath|pant|inhale|exhale|gasps|sniffs|sighs|snorts|burps|lip-smacking|humming|hissing|emm|sneezes)\)/gi;
    const NEXT_DIRECTIVE_RE = /\{\s*next\s*[:：]\s*["'“”‘’]?([^}"'“”‘’]+)["'“”‘’]?\s*\}/gi;

    const AGENT_IDS = ['jobs', 'kobe', 'munger', 'hawking', 'gates'];
    const connections = {};
    const messageHistory = {};
    const typingBuffers = {};
    const typingTimeouts = {};
    const streamFinalized = {};
    const STREAM_IDLE_FORCE_END_MS = 45000; // 流式超过该时间无新增 chunk，强制按 end 收敛，避免整轮卡死
    const ttsManagers = {};

    // Room 系统变量
    let currentChannel = null;
    let isHost = false;
    let isAgent = false;
    let currentPodcastRoomId = '';
    let speakerPollingInterval = null;
    let lastKnownSpeakerIndex = -1;
    let lastSelectedLang = 'zh';
    let moderatorStartInFlight = false;
    let moderatorStopInFlight = false;
    let roundtableStartedAtMs = 0;
    let roomCreatePromise = null;
    let roomRecoveryInFlight = false;
    const processedStreamingControlIds = new Set();
    const hostRuntimeId = 'rt-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);

    // 前端日志降噪：默认 quiet，避免音频收发高频 log 拖慢页面。
    // 开启详细日志：URL 加 ?rt_log=verbose 或 localStorage.roundtable_log_level='verbose'
    (function setupRoundtableLogGate() {
      var params = new URLSearchParams(window.location.search);
      var levelFromUrl = (params.get('rt_log') || '').toLowerCase();
      var levelFromStorage = '';
      try { levelFromStorage = String(localStorage.getItem('roundtable_log_level') || '').toLowerCase(); } catch (_) {}
      var verbose = (levelFromUrl === 'verbose') || (levelFromStorage === 'verbose') || (levelFromUrl === 'debug') || (levelFromStorage === 'debug');
      if (verbose) return;

      var nativeLog = console.log.bind(console);
      var throttleMap = new Map();

      var suppressKeywords = [
        '已收到 ',
        'TTS event:',
        '[Room WS] 收到消息:',
        '[Room] 回复文本同步:',
        '[Room] 轮询:',
        '[TopicBar]',
        '[Room] 音频数据:',
        '[Room] 音频长度:',
        '[Room] 播放实时音频块:',
        '[Room] 缓存音频:',
        '[Room] 缓存跳过:',
        '[Room] 播放历史音频:',
        '[Room] syncToSpeaker',
        '[Room] 恢复发言:'
      ];

      var throttleRules = [
        { key: '[Room] 发言人变化:', ms: 2000 },
        { key: '[Room] 收到麦序更新:', ms: 3000 },
        { key: '[Room] 麦序状态:', ms: 3000 },
        { key: '[Mobile] 标记下一位发言人:', ms: 2000 }
      ];

      function hitThrottle(key, intervalMs) {
        var now = Date.now();
        var prev = throttleMap.get(key) || 0;
        if (now - prev < intervalMs) return true;
        throttleMap.set(key, now);
        return false;
      }

      function shouldSuppressLog(argsLike) {
        var first = argsLike && argsLike[0];
        if (typeof first !== 'string' || !first) return false;

        for (var i = 0; i < suppressKeywords.length; i++) {
          if (first.indexOf(suppressKeywords[i]) !== -1) return true;
        }
        for (var j = 0; j < throttleRules.length; j++) {
          var rule = throttleRules[j];
          if (first.indexOf(rule.key) !== -1) {
            return hitThrottle(rule.key, rule.ms);
          }
        }
        return false;
      }

      console.log = function() {
        if (shouldSuppressLog(arguments)) return;
        nativeLog.apply(console, arguments);
      };

      nativeLog('[RT-Log] quiet mode enabled (use ?rt_log=verbose to show full logs)');
    })();

    // 初始化时检查 URL 参数
    (function initRoomFromURL() {
      const urlParams = new URLSearchParams(window.location.search);
      const channelId = urlParams.get('channel');
      const roomId = urlParams.get('room_id');
      const charactersParam = urlParams.get('characters');
      const characterVoicesParam = urlParams.get('character_voices');
      currentPodcastRoomId = roomId ? roomId.trim() : '';

      if (channelId) {
        // 带频道参数：加入已有房间，但以主机模式运行
        currentChannel = channelId;
        isHost = true;
        isAgent = false;
        console.log('[Room] 加入房间（主机模式），频道:', channelId);
      } else {
        // 无频道：独立模式
        isHost = true;
        console.log('[Room] 独立模式');
      }

      // 从 URL 获取 characters 和 character_voices 参数
      if (charactersParam) {
        window.roomCharacters = charactersParam.split(',').map(c => c.trim());
        console.log('[Room] URL人物:', window.roomCharacters);
      }

      if (characterVoicesParam) {
        window.roomVoiceIds = characterVoicesParam.split(',').map(v => v.trim());
        console.log('[Room] URL音色:', window.roomVoiceIds);
      }
    })();

    // 动态获取 agents 配置
    function loadAgentsConfig() {
      return fetch('/api/agents?' + new URLSearchParams({
        characters: window.roomCharacters ? window.roomCharacters.join(',') : '',
        character_voices: window.roomVoiceIds ? window.roomVoiceIds.join(',') : ''
      }))

    // 渲染 agent 面板
    function renderAgentPanels() {

          : emoji;
        // 保留已调过的音量值（开播重新渲染时不重置）
        const curVol = (ttsManagers[agentId] && ttsManagers[agentId].volumeGain != null)
          ? Math.round(ttsManagers[agentId].volumeGain * 100) : 100;

        const panelHtml = `
          <div class="panel" id="panel-${agentId}">
            <div class="panel-header">
              <div class="panel-title">
                <div class="panel-icon ${agentId}">${iconContent}</div>
                <div><div>${displayName}</div><div class="panel-model">AI Agent</div></div>
              </div>
              <div class="volume-control">
                <span class="volume-icon">🔊</span>
                <input type="range" class="volume-slider" id="volume-${agentId}"
                  min="0" max="300" value="${curVol}"
                  oninput="setAgentVolume('${agentId}', this.value)">
                <span class="volume-value" id="volume-val-${agentId}">${curVol}%</span>
              </div>
              <div class="panel-actions">
                <button class="btn-icon" onclick="clearChat('${agentId}')">清</button>
              </div>
            </div>
            <div class="messages" id="messages-${agentId}"></div>
            <div class="input-area">
              <div class="input-wrapper">
                <input type="text" id="input-${agentId}" placeholder="输入消息..."
                  onkeydown="if(event.key==='Enter'&&!event.isComposing)sendMessage('${agentId}')">
                <button class="btn-send" id="btn-${agentId}" onclick="sendMessage('${agentId}')">发送</button>
              </div>
            </div>
          </div>
        `;
        container.insertAdjacentHTML('beforeend', panelHtml);
      });

      console.log('[Room] 渲染了', count, '个席位');
    }

    function ensureAgentRuntime(agentId) {
      if (!connections[agentId]) {
        connections[agentId] = { ws: null, connected: false };
      }
      if (!messageHistory[agentId]) {
        messageHistory[agentId] = [];
      }
      if (typeof typingBuffers[agentId] !== 'string') {
        typingBuffers[agentId] = '';
      }
      if (!ttsManagers[agentId]) {
        ttsManagers[agentId] = new TTSManager(agentId);
      }
      if (typeof streamFinalized[agentId] !== 'boolean') {
        // 空闲态应视为“已收敛”，避免首轮被误判为重复 start/moderator
        streamFinalized[agentId] = true;
      }
    }

    // 初始化 AGENT_IDS（异步）- 保存 promise 供 window.onload 使用
    var agentsConfigPromise = loadAgentsConfig().then(function() {
      // 再次确保 window.roomAgentIds 是过滤后的
      if (window.roomCharacters && window.roomCharacters.length > 0) {
        const allowedSet = new Set(window.roomCharacters.map(c => c.toLowerCase()));
        if (window.roomAgentIds) {
          window.roomAgentIds = window.roomAgentIds.filter(id => allowedSet.has(id.toLowerCase()));
        }
      }

      const agentIds = window.roomAgentIds || AGENT_IDS;
      agentIds.forEach(function(id) { ensureAgentRuntime(id); });
      // 渲染 UI
      renderAgentPanels();
    });

    // TTS Manager 类
    var TTS_RATE_LIMIT_RETRY_DELAY_MS = 30000;
    // 调试开关：关闭“失败重试/自动跳过”，用于观察真实失败形态
    var ROUNDTABLE_DISABLE_FAILURE_RECOVERY = true;
    var ttsGlobalCooldownUntil = 0;

    function TTSManager(agentId) {
      this.agentId = agentId;
      this.audioContext = null;
      this.analyser = null;
      this.ws = null;
      this.isOpen = false;
      this.nextTime = 0;
      this.seen = new Set();
      this.textBuf = '';
      this.pendingTexts = [];
      this.audioChunks = []; // 收集音频数据
      this.isPlaying = false;
      this._muted = false; // 被用户打断后静音，阻止后续 TTS
      this.activeSources = 0; // 活跃播放源计数
      this.activeSrcList = []; // 活跃 AudioBufferSource 列表，用于强制停止
      this._syncPlaybackSource = null; // 分机同步播放源（loadAndPlay）
      this._loadPlayToken = 0; // 递增令牌：取消过期 loadAndPlay 回调
      this.endSignalSent = false; // 是否已发送 end 信号
      this.taskFinished = false; // MiniMax 已发送全部音频
      this.nearEndTimer = null; // 提前触发定时器
      this.onNearEnd = null; // 音频快结束时的回调
      this.callbackFired = false; // 回调是否已触发
      this.textComplete = false; // 文本推理是否完成
      this.audioStarted = false; // 音频是否已经开始播放
      this.speechType = 'next'; // 'next' 或 'transition'，决定提前触发时间
      this.playQueue = Promise.resolve(); // 串行化解码播放，防止乱序
      this.firstPlay = true; // 首次播放标记，用于启动缓冲
      this._waitForPrevSpeaker = null;
      this._resolveMyDone = null;
      this.volumeGain = 1.0; // 每个 agent 独立音量倍率，默认 1.0 (100%)
      this._retryTimer = null;
      this._rateLimitCooldownUntil = 0;
      this._speechStartedNotified = false;
      this._speechStartedRetryTimer = null;
      this._speechStartedRetryCount = 0;
      this._cacheCompleteSent = false;
      this._pendingCacheChunks = [];
      this._pendingCacheComplete = false;
      this._rpmProfileFetched = false;
      this._sendEndTimer = null;
      this._turnStartedAt = 0;
      this._lastTextChunkAt = 0;
      this._lastTtsMsgAt = 0;
      this._lastTtsEvent = '';
      this._lastAudioChunkAt = 0;
      this._lastStuckDiagKey = '';
      this._lastStuckDiagAt = 0;
    }
    
    TTSManager.prototype.init = function() {
      if (!this.audioContext) {
        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        // 每个 TTSManager 创建自己的 GainNode（同一个 AudioContext 内）
        this.gainNode = this.audioContext.createGain();
        this.gainNode.gain.value = (typeof localMuted !== 'undefined' && localMuted) ? 0 : this.volumeGain;
        this.gainNode.connect(this.audioContext.destination);
        // 注册到全局列表，方便 toggleMute 统一控制
        if (!window._allGainNodes) window._allGainNodes = [];
        window._allGainNodes.push(this.gainNode);
        this.analyser = this.audioContext.createAnalyser();
        this.analyser.fftSize = 64;
        this.analyser.connect(this.gainNode);
        console.log('[' + this.agentId + '] AudioContext created, state:', this.audioContext.state);
      }
      if (this.audioContext.state === 'suspended') {
        this.audioContext.resume().then(function() {
          console.log('[' + this.agentId + '] AudioContext resumed');
        }.bind(this));
      }
    };
    
    TTSManager.prototype.appendText = function(text, isFinal) {
      if (this._muted) return; // 被打断后不再生成 TTS
      if (!this.audioContext) this.init();
      this._stopped = false; // 新文本到来，重置停止状态

      // 添加到缓冲区
      if (text) {
        this.textBuf += text;
      }
      
      // 检查是否需要发送：
      // 1. 遇到标点符号（断句点）
      // 2. 缓冲区满了（>= 30 字符）
      // 3. 最后一段（isFinal）
      // 遇到完整断句或满20字就发送
      var hasEndPunctuation = /[。！？.!?;；]/.test(this.textBuf);
      var isLongEnough = this.textBuf.length >= 50;

      if ((hasEndPunctuation || isLongEnough || isFinal) && this.textBuf.length > 0) {
        var protectedCues = [];
        var cueProtectedText = this.textBuf.replace(EXPRESSIVE_TTS_CUE_RE, function(match) {
          var normalized = match.toLowerCase();
          var marker = '@@TTSCUE' + protectedCues.length + '@@';
          protectedCues.push(normalized);
          return marker;
        });

        // 清理 markdown 标记、换行符和 {next: ...} 控制标记
        // 注意：必须先清理 {next: ...}，因为 markdown 清理会去掉 {} 导致正则失效
        var clean = cueProtectedText
          .replace(NEXT_DIRECTIVE_RE, '')      // 先去掉 {next: ...} 控制标记
          .replace(/\{changeTopic:[^}]+\}/g, '') // 去掉 {changeTopic: true} 控制标记
          .replace(/[*#\`_[\](){}|]/g, '')     // 再去掉 markdown 和标点
          .replace(/\n+/g, ' ')                 // 换行符变空格
          .replace(/\s{2,}/g, ' ')              // 合并多余空格
          .trim();
        if (protectedCues.length > 0) {
          clean = clean.replace(/@@TTSCUE(\d+)@@/g, function(_, idx) {
            var cue = protectedCues[Number(idx)];
            return cue || '';
          }).replace(/\s{2,}/g, ' ').trim();
        }
        if (clean.length > 0) {
          this.sendText(clean);
        }
        this.textBuf = ''; // 清空缓冲区
      }
      
      // 结束
      if (isFinal) {
        this.sendEnd();
      }
    };

    TTSManager.prototype.clearReconnectTimer = function() {
      if (this._retryTimer) {
        clearTimeout(this._retryTimer);
        this._retryTimer = null;
      }
    };

    TTSManager.prototype.logServerRpmProfileOnce = function(reason) {
      if (this._rpmProfileFetched) return;
      this._rpmProfileFetched = true;
      var self = this;
      var qs = new URLSearchParams({ agentId: this.agentId });
      if (currentChannel) qs.set('channelId', currentChannel);
      fetch('/api/roundtable/rpm-profile?' + qs.toString(), { cache: 'no-store' })
        .then(function(res) {
          if (!res.ok) throw new Error('http_' + res.status);
          return res.json();
        })
        .then(function(p) {
          var active = (p && p.flushProfiles && p.flushProfiles.active) || {};
          var preload = (p && p.flushProfiles && p.flushProfiles.preload) || {};
          console.warn(
            '[' + self.agentId + '] [RPM/API] reason=' + (reason || 'unknown') +
            ' | task_continue<=~' + (p.estimatedTaskContinueRpmCap || 'n/a') + '/min' +
            ' | budget=' + (p.recommendedBudgetRpm || 'n/a') + '/min' +
            ' | real60s(global)=' + (p.realTaskContinueRpmGlobal || 0) + '/min' +
            ' (' + (p.budgetUsageGlobalPct || 0) + '%budget)' +
            ' | real60s(this)=' + (p.realTaskContinueRpmScoped || 0) + '/min' +
            ' (' + (p.budgetUsageScopedPct || 0) + '%budget)' +
            ' | minGap=' + (p.taskContinueMinGapMs || 'n/a') + 'ms' +
            (p.rateLimitGuardActive ? (' | guard=' + (p.rateLimitGuardRemainingMs || 0) + 'ms') : '') +
            ' | completeOnly=' + (!!preload.flushOnCompleteOnly) +
            ' | active=' + (active.minChars || 'n/a') + '字/' + (active.intervalMs || 'n/a') + 'ms' +
            ' | preload=' + (preload.minChars || 'n/a') + '字/' + (preload.intervalMs || 'n/a') + 'ms' +
            ' | queue=' + (p.queueDepth || 0) + '/' + (p.queueLimit || 'n/a') +
            ' | cooldownLeft=' + (p.cooldownRemainingMs || 0) + 'ms'
          );
        })
        .catch(function(err) {
          self._rpmProfileFetched = false;
          console.warn('[' + self.agentId + '] [RPM/API] 获取失败:', err && err.message ? err.message : err);
        });
    };

    TTSManager.prototype.scheduleReconnect = function(delayMs, reason) {
      var self = this;
      this.clearReconnectTimer();
      var delay = Math.max(100, Number(delayMs) || 0);
      this._retryTimer = setTimeout(function() {
        self._retryTimer = null;
        if (self._muted || self.ws) return;
        console.log('[' + self.agentId + '] TTS 重连触发: reason=' + (reason || 'unknown') + ', delay=' + delay + 'ms');
        self.connectWS();
      }, delay);
    };

    
    TTSManager.prototype.connectWS = function() {
      if (this.ws || this._muted) return;
      var self = this;

      var now = Date.now();
      var cooldownUntil = Math.max(ttsGlobalCooldownUntil || 0, this._rateLimitCooldownUntil || 0);
      if (cooldownUntil > now) {
        var cooldownDelay = cooldownUntil - now;
        console.warn('[' + this.agentId + '] TTS 冷却中，' + Math.ceil(cooldownDelay / 1000) + 's 后再连');
        this.scheduleReconnect(cooldownDelay, 'cooldown');
        return;
      }
      
      // 先初始化 pendingTexts，避免 sendText 时出错
      if (!this.pendingTexts) this.pendingTexts = [];

      // 构建 WebSocket URL（支持房间参数）
      var ttsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/tts/' + this.agentId;
      if (currentChannel) {
        ttsUrl += '?channel=' + currentChannel;
      }
      var thisWs = new WebSocket(ttsUrl);
      this.ws = thisWs;
      function isCurrentWs() {
        return self.ws === thisWs;
      }
      console.log('[' + this.agentId + '] Connecting TTS WebSocket...' + (currentChannel ? ' (channel: ' + currentChannel + ')' : ''));
      
      thisWs.onopen = function() {
        if (!isCurrentWs()) {
          try { thisWs.close(); } catch (e) {}
          return;
        }
        self.isOpen = true;
        self.clearReconnectTimer();
        self._ttsRetryCount = 0;
        console.log('[' + self.agentId + '] TTS WebSocket connected');
        self.logServerRpmProfileOnce('tts_ws_open');
        // 发送队列中的文本
        while (self.pendingTexts && self.pendingTexts.length > 0) {
          var t = self.pendingTexts.shift();
          thisWs.send(JSON.stringify({type: 'text', content: t}));
        }
        // 限流重试后重新发送 end 信号（必须在文本之后）
        if (self._needResendEnd) {
          self._needResendEnd = false;
          self.sendEnd();
        }
      };
      
      var audioChunkCount = 0;
      var self = this;
      thisWs.onmessage = function(e) {
        if (!isCurrentWs()) return;
        try {
          var d = JSON.parse(e.data);
          self._lastTtsMsgAt = Date.now();
          self._lastTtsEvent = d.event || ((d.data && d.data.audio) ? 'audio_chunk' : 'unknown');
          if (d.event === 'rpm_profile') {
            console.warn(
              '[' + self.agentId + '] [RPM] reason=' + (d.reason || 'unknown') +
              ' | mode=' + (d.flushMode || 'n/a') +
              ' | task_continue<=~' + (d.estimatedTaskContinueRpmCap || 'n/a') + '/min' +
              ' | budget=' + (d.recommendedBudgetRpm || 'n/a') + '/min' +
              ' | real60s(global)=' + (d.realTaskContinueRpmGlobal || 0) + '/min' +
              ' (' + (d.budgetUsageGlobalPct || 0) + '%budget)' +
              ' | real60s(this)=' + (d.realTaskContinueRpmScoped || 0) + '/min' +
              ' (' + (d.budgetUsageScopedPct || 0) + '%budget)' +
              ' | minGap=' + (d.taskContinueMinGapMs || 'n/a') + 'ms' +
              (d.rateLimitGuardActive ? (' | guard=' + (d.rateLimitGuardRemainingMs || 0) + 'ms') : '') +
              ' | completeOnly=' + (!!d.flushOnCompleteOnly) +
              ' | flush=' + (d.textFlushMinChars || 'n/a') + '字/' + (d.textFlushIntervalMs || 'n/a') + 'ms' +
              ' | queue=' + (d.queueDepth || 0) + '/' + (d.queueLimit || 'n/a') +
              ' | cooldownLeft=' + (d.cooldownRemainingMs || 0) + 'ms'
            );
            return;
          }
          if (d.data && d.data.audio) {
            audioChunkCount++;
            self._lastAudioChunkAt = Date.now();
            if (audioChunkCount % 10 === 0) {
              console.log('[' + self.agentId + '] 已收到 ' + audioChunkCount + ' 个音频块');
            }
            self.audioChunks.push(d.data.audio);

            // 主机：缓存音频块到服务端
            if (isHost && currentChannel) {
              if (self.audioStarted) {
                self.cacheAudioToServer(d.data.audio, false);
              } else {
                // 预准备阶段先本地缓存，等真实开口后再上报
                self._pendingCacheChunks.push(d.data.audio);
              }
            }

            // 首次播放等 4 个 chunk 建立缓冲，之后每 4 个 chunk 批量处理
            var threshold = self.firstPlay ? 4 : 4;
            if (self.audioChunks.length >= threshold) {
              self.playChunks();
            }
          } else {
            console.log('[' + self.agentId + '] TTS event:', d.event);
          }
          // MiniMax TTS 失败处理
          if (d.event === 'task_failed') {
            var statusMsg = (d.base_resp && d.base_resp.status_msg) || '';
            var statusMsgLower = String(statusMsg || '').toLowerCase();
            var isRateLimit = statusMsgLower.indexOf('rate limit') !== -1 || statusMsgLower.indexOf('rpm') !== -1;
            if (!self._ttsRetryCount) self._ttsRetryCount = 0;

            // 限流错误：仅在“尚未产出任何音频”时重试，避免已播内容被重放两遍
            var hasAudioOutput = !!(
              self.audioStarted ||
              self.activeSources > 0 ||
              (self.audioChunks && self.audioChunks.length > 0) ||
              audioChunkCount > 0
            );

            if (isRateLimit && !self._muted && !hasAudioOutput) {
              var retryDelay = TTS_RATE_LIMIT_RETRY_DELAY_MS;
              self._ttsRetryCount = (self._ttsRetryCount || 0) + 1;
              self._rateLimitCooldownUntil = Date.now() + retryDelay;
              // 全局退避，降低多房间/多人同一时刻再次打爆 RPM 的概率
              ttsGlobalCooldownUntil = Math.max(ttsGlobalCooldownUntil, Date.now() + retryDelay);
              console.warn(
                '[' + self.agentId + '] TTS 被限流，' + (retryDelay / 1000).toFixed(0) +
                '秒后重试（第' + self._ttsRetryCount + '次，无限重试）'
              );
              // 关闭旧连接
              try { self.ws.close(); } catch(e) {}
              self.ws = null;
              self.isOpen = false;
              // 把已发文本放回 pending 队列
              self.pendingTexts = (self._allSentTexts || []).slice();
              // 标记需要在 onopen 后重新发送 end 信号（不能在这里直接调 sendEnd，WS 还没连上）
              self._needResendEnd = !!self.endSignalSent;
              self.endSignalSent = false;
              self.scheduleReconnect(retryDelay, 'rate_limit_forever');
              return; // 不标记 taskFinished，不触发兜底
            }

            if (isRateLimit && hasAudioOutput) {
              console.warn('[' + self.agentId + '] TTS 限流发生在已产出音频后，跳过重试以避免重复播报');
            }
            // 非限流失败（或“已有音频产出时的限流”）走原有兜底逻辑
            console.error('[' + self.agentId + '] MiniMax task_failed (不可重试): ' + statusMsg);
            self.taskFinished = true;
            // 主机：task_failed 终态也要通知服务端完成，避免房间 currentSpeaker 永远停留在 ttsStreaming=true
            if (isHost && currentChannel && !self._cacheCompleteSent) {
              if (self.audioStarted) {
                self._cacheCompleteSent = true;
                self.cacheAudioToServer('', true);
              } else {
                // 尚未真实开口时，延后 complete 上报，避免误推进
                self._pendingCacheComplete = true;
                console.log('[' + self.agentId + '] 延后上报缓存完成：等待真实开口后再发送');
              }
            }
            // 如果音频已经播完，直接 resolve _resolveMyDone，避免卡死下一位
            // 需同时满足：activeSources=0、srcList 为空、剩余调度时长≈0，防止计数漂移导致提前放行。
            var failSrcCount = self.activeSrcList ? self.activeSrcList.length : 0;
            var failRemaining = self.audioContext ? (self.nextTime - self.audioContext.currentTime) : 0;
            if (
              self._resolveMyDone &&
              self.activeSources === 0 &&
              failSrcCount === 0 &&
              failRemaining <= 0.12 &&
              (!self.audioChunks || self.audioChunks.length === 0)
            ) {
              console.log('[' + self.agentId + '] ✅ task_failed 且音频已播完，resolve prevSpeakerDone');
              self._resolveMyDone();
              self._resolveMyDone = null;
            }
            if (!self.audioChunks || self.audioChunks.length === 0) {
              if (ROUNDTABLE_DISABLE_FAILURE_RECOVERY) {
                console.warn('[' + self.agentId + '] task_failed 无音频（调试模式：不自动跳过）');
                return;
              }
              self.handleNoAudioCompletion('task_failed无音频兜底: ' + statusMsg);
              return;
            }
            if (self.audioStarted) {
              if (ROUNDTABLE_DISABLE_FAILURE_RECOVERY) {
                console.warn('[' + self.agentId + '] task_failed（调试模式：不自动跳过）');
              } else if (AUTO_SKIP_ON_FAILURE) {
                setTimeout(function() {
                  self.fireNearEndCallback('task_failed兜底');
                }, 1000);
              } else {
                console.warn('[' + self.agentId + '] ⚠️ task_failed，按配置不自动跳过');
              }
            } else {
              // 关键修复：预准备态也必须收敛，否则“限流+未开口”会把整轮卡死在 nextPrepared。
              if (ROUNDTABLE_DISABLE_FAILURE_RECOVERY) {
                console.warn('[' + self.agentId + '] task_failed 且 audioStarted=false（调试模式：不自动推进）');
              } else {
                console.warn('[' + self.agentId + '] task_failed 且 audioStarted=false，启动有序兜底推进');
                self.handleNoAudioCompletion('task_failed预准备态兜底: ' + statusMsg);
              }
            }
          }
          // MiniMax 全部音频已发送完毕
          if (d.event === 'task_finished') {
            console.log('[' + self.agentId + '] MiniMax task_finished, 共收到 ' + audioChunkCount + ' 个音频块');
            self.taskFinished = true;
            if (self.audioChunks.length > 0) {
              self.playChunks();
            } else {
              if (ROUNDTABLE_DISABLE_FAILURE_RECOVERY) {
                console.warn('[' + self.agentId + '] task_finished 无音频（调试模式：不自动跳过）');
              } else {
                self.handleNoAudioCompletion('task_finished无音频兜底');
              }
            }

            // 主机：通知服务端TTS完成
            if (isHost && currentChannel) {
              // 发送最后一个空块表示完成
              if (!self._cacheCompleteSent && self.audioStarted) {
                self._cacheCompleteSent = true;
                self.cacheAudioToServer('', true);
              } else if (!self.audioStarted) {
                self._pendingCacheComplete = true;
                console.log('[' + self.agentId + '] 延后上报 task_finished：等待真实开口后再发送');
              }
            }

            // 注意：下一位的准备已经在文本完成+音频开始时触发了
            // 这里不需要额外处理，只需要播放完剩余音频即可
          }
        } catch(err) {
          console.error('[' + self.agentId + '] TTS msg error:', err);
        }
      };
      
      thisWs.onerror = function(e) { 
        if (!isCurrentWs()) return;
        console.error('[' + self.agentId + '] TTS WebSocket error:', e);
      };
      thisWs.onclose = function() {
        if (!isCurrentWs()) return;
        console.log('[' + self.agentId + '] TTS WebSocket closed');
        self._lastTtsEvent = 'ws_closed';
        self.isOpen = false;
        self.ws = null;
        // 兜底：等解码队列跑完，再看是否需要触发
        // 注意：只有真正开始播放的人才需要兜底，还在等待前一位的不需要
        if (!self.callbackFired && self.audioStarted) {
          console.warn('[' + self.agentId + '] TTS 断开但回调未触发（audioStarted=true），等 playQueue 完成...');
          self.playQueue.then(function() {
            if (self.callbackFired) {
              console.log('[' + self.agentId + '] [ws.onclose 兜底] 回调已被其他路径触发，跳过');
              return;
            }
            var srcListCount = self.activeSrcList ? self.activeSrcList.length : 0;
            var remaining = self.audioContext ? (self.nextTime - self.audioContext.currentTime) : 0;
            if (self.activeSources > 0 || srcListCount > 0 || remaining > 0.12) {
              // 还有音频在播放，交给 src.onended 处理
              console.log(
                '[' + self.agentId + '] [ws.onclose 兜底] 仍有播放残留，等待 src.onended | activeSources=' +
                self.activeSources + ', srcList=' + srcListCount + ', remaining=' + remaining.toFixed(2) + 's'
              );
            } else {
              // 没有音频在播放了，直接触发
              console.warn('[' + self.agentId + '] [ws.onclose 兜底] 无活跃音频，触发 nearEnd');
              // 兜底释放等待链：即使 task_finished 事件丢失，只要连接已关闭且无活跃音频，就允许下一位开始
              if (self._resolveMyDone && (!self.audioChunks || self.audioChunks.length === 0)) {
                console.log('[' + self.agentId + '] ✅ ws.onclose 兜底，resolve prevSpeakerDone');
                self._resolveMyDone();
                self._resolveMyDone = null;
              }
              self.fireNearEndCallback('ws.onclose兜底(playQueue完成+无活跃音频)');
            }
          });
        } else if (!self.callbackFired) {
          console.log('[' + self.agentId + '] TTS 断开但 audioStarted=false（还在等待前一位），跳过兜底');
        }
      };
    };
    
    TTSManager.prototype.sendText = function(text) {
      if (!this.pendingTexts) this.pendingTexts = [];
      if (!this._allSentTexts) this._allSentTexts = [];
      this._allSentTexts.push(text); // 记录所有文本，限流重试时重放
      if (this.ws && this.ws.readyState === 1) {
        this.ws.send(JSON.stringify({type: 'text', content: text}));
      } else {
        this.pendingTexts.push(text);
        console.log('[' + this.agentId + '] Queued text:', text.slice(0, 20));
        if (!this.ws) {
          this.seen.clear();
          this.nextTime = this.audioContext.currentTime;
          this.connectWS();
        }
      }
    };
    
    TTSManager.prototype.sendEnd = function() {
      var self = this;
      this.endSignalSent = true;
      if (this._sendEndTimer) {
        clearTimeout(this._sendEndTimer);
        this._sendEndTimer = null;
      }
      this._sendEndTimer = setTimeout(function() {
        self._sendEndTimer = null;
        if (!self.endSignalSent) return;
        if (self.ws && self.ws.readyState === 1) {
          console.log('[' + self.agentId + '] 发送 TTS end 信号');
          self.ws.send(JSON.stringify({type: 'end'}));
        } else if (self.ws && self.ws.readyState === 0) {
          // 连接仍在握手：标记为待补发，等 onopen 后发送，避免 end 丢失导致 MiniMax 120s 超时
          self._needResendEnd = true;
          console.log('[' + self.agentId + '] TTS end 延迟补发（WS CONNECTING）');
        } else if (!self.ws) {
          // 无连接则不创建新会话；如果后续因重试重连，_needResendEnd 会在 onopen 后补发
          self._needResendEnd = true;
          console.log('[' + self.agentId + '] TTS end 暂存（无可用WS）');
        }
      }, 500);
    };

    // 注意：scheduleNearEndCallback 已被移除，现在使用 checkPrepareNext
    // 当文本推理完成 + 音频开始播放时，自动触发下一位准备

    // 检查是否可以准备下一位
    // 仅当“当前人已真正开始播放(audioStarted=true)”后，才允许触发下一位预加载
    TTSManager.prototype.checkPrepareNext = function(source) {
      if (this._muted) return;

      // 预加载条件：当前发言人已开口 + 文本已完成
      if (source === '音频开始') {
        // 如果文本已经完成，立即触发预加载
        if (this.audioStarted && this.textComplete) {
          this.fireNearEndCallback(source);
        }
      } else if (source === '文本完成') {
        // 如果音频已经开始播放，立即触发预加载
        if (this.audioStarted) {
          this.fireNearEndCallback(source);
        }
      }
    };

    // 无音频兜底：TTS 返回完成/失败但没有任何音频块时，主动收敛本轮，避免圆桌卡死
    TTSManager.prototype.handleNoAudioCompletion = function(reason) {
      if (this._muted) return;
      if (ROUNDTABLE_DISABLE_FAILURE_RECOVERY) {
        console.warn('[' + this.agentId + '] ⚠️ ' + String(reason || '无音频兜底') + '（调试模式：禁用自动推进）');
        return;
      }
      var note = String(reason || '无音频兜底');
      var isRateLimitFailure = /rate\s*limit|rpm/i.test(note);
      if (!AUTO_SKIP_ON_FAILURE) {
        // 即使全局关闭自动跳过，限流导致“完全无音频”时仍要收敛，避免整轮永久卡死
        if (!isRateLimitFailure) {
          console.warn('[' + this.agentId + '] ⚠️ ' + note + '，按配置不自动跳过');
          return;
        }
        console.warn('[' + this.agentId + '] ⚠️ 检测到限流无音频，强制执行兜底收敛，避免卡死');
      }
      var self = this;
      console.warn('[' + this.agentId + '] ⚠️ ' + note + '：无音频输出，启动兜底');

      if (this._noAudioRecoveryTimer) {
        clearTimeout(this._noAudioRecoveryTimer);
        this._noAudioRecoveryTimer = null;
      }

      var waited = 0;
      var step = 250;
      var maxWait = 6000;
      var finalized = false;

      function finalize(trigger) {
        if (finalized) return;
        finalized = true;
        if (!self.callbackFired && self.onNearEnd) {
          self.fireNearEndCallback(trigger);
        }
        if (self._resolveMyDone) {
          console.log('[' + self.agentId + '] ✅ 无音频兜底，resolve prevSpeakerDone');
          self._resolveMyDone();
          self._resolveMyDone = null;
        }
        if (isSpeaking && currentSpeaker === self.agentId) {
          console.log('[' + self.agentId + '] ✅ 无音频兜底，释放 speaking 锁');
          isSpeaking = false;
          currentSpeaker = null;
        }
      }

      // 关键保护：若当前是“预准备态”（audioStarted=false 且仍在等待前一位），
      // 兜底推进前必须先等待前一位真正说完，避免出现两人同时说话。
      function finalizeInOrder(trigger) {
        if (self.audioStarted || !self._waitForPrevSpeaker) {
          finalize(trigger);
          return;
        }
        var waitRef = self._waitForPrevSpeaker;
        console.log('[' + self.agentId + '] ⏳ 无音频兜底等待前一位播完后再推进');
        Promise.resolve(waitRef).then(function() {
          if (self._waitForPrevSpeaker === waitRef) {
            self._waitForPrevSpeaker = null;
          }
          if (self._muted) return;
          finalize(trigger + '(ordered)');
        }).catch(function() {
          if (self._muted) return;
          finalize(trigger + '(ordered-fallback)');
        });
      }

      function tick() {
        if (self._muted || self.callbackFired) return;
        if (self.textComplete) {
          self.checkPrepareNext('文本完成');
          finalizeInOrder(note + '(文本完成)');
          return;
        }
        waited += step;
        if (waited >= maxWait) {
          console.warn('[' + self.agentId + '] ⚠️ 无音频兜底等待文本完成超时，强制收敛');
          finalizeInOrder(note + '(超时强制)');
          return;
        }
        self._noAudioRecoveryTimer = setTimeout(tick, step);
      }

      this._noAudioRecoveryTimer = setTimeout(tick, step);
    };

    TTSManager.prototype.fireNearEndCallback = function(triggerSource) {
      if (this.callbackFired) {
        console.log('[' + this.agentId + '] [fireNearEnd] 已触发过，忽略 (来源: ' + (triggerSource || '未知') + ')');
        return;
      }
      this.callbackFired = true;

      // 注意：不要在这里清除 nextSpeakerPending！
      // 它需要保留到当前发言人的音频播完（在 src.onended 中清除），以便滚动到下一位
      var remaining = this.audioContext ? (this.nextTime - this.audioContext.currentTime) : -1;
      console.log('[' + this.agentId + '] ★ fireNearEndCallback 触发！来源: ' + (triggerSource || '未知') +
        ' | activeSources=' + this.activeSources +
        ' | remaining=' + remaining.toFixed(1) + 's' +
        ' | endSignalSent=' + this.endSignalSent +
        ' | taskFinished=' + this.taskFinished +
        ' | onNearEnd=' + (this.onNearEnd ? '已设置' : '未设置'));
      if (this.onNearEnd) {
        try {
          this.onNearEnd();
          console.log('[' + this.agentId + '] ✅ onNearEnd 回调执行成功');
        } catch (e) {
          console.error('[' + this.agentId + '] ❌ onNearEnd 回调执行失败:', e);
        }
      } else {
        console.warn('[' + this.agentId + '] ⚠️ onNearEnd 未设置，无法触发下一位');
      }
    };

    // 通知服务器该 agent 已开始播放
    TTSManager.prototype.notifySpeechStarted = function() {
      if (this._speechStartedNotified) return;
      var self = this;
      var payload = { agentId: this.agentId, channelId: currentChannel };

      function clearRetryTimer() {
        if (self._speechStartedRetryTimer) {
          clearTimeout(self._speechStartedRetryTimer);
          self._speechStartedRetryTimer = null;
        }
      }

      function scheduleRetry() {
        if (self._speechStartedNotified || self._muted || self._stopped) return;
        var delay = Math.min(3000, 300 * Math.pow(2, self._speechStartedRetryCount));
        self._speechStartedRetryCount++;
        clearRetryTimer();
        self._speechStartedRetryTimer = setTimeout(sendOnce, delay);
      }

      function sendOnce() {
        if (self._speechStartedNotified || self._muted || self._stopped) return;
        fetch('/api/roundtable/speech-started', {
          method: 'POST',
          keepalive: true,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })
        .then(function(res) {
          if (!res.ok) throw new Error('http_' + res.status);
          self._speechStartedNotified = true;
          clearRetryTimer();
          console.log('[' + self.agentId + '] ✅ speech-started 已确认');
          self.flushDeferredCacheToServer('speech-started-confirmed');
        })
        .catch(function(err) {
          console.error('[' + self.agentId + '] ❌ speech-started 通知失败:', err && err.message ? err.message : err);
          scheduleRetry();
        });
      }

      console.log('[' + this.agentId + '] 🎵 首次播放，通知服务器清除准备状态');
      sendOnce();
    };
    
    // 合并缓冲的 chunks 并播放（串行化，防止 decodeAudioData 乱序完成导致音频段错位）
    TTSManager.prototype.playChunks = function() {
      // 确保 AudioContext 已初始化
      if (!this.audioContext) this.init();

      // [Fix] 如果有新的 chunk 到达，取消之前的"完成"倒计时
      if (this._resolveTimer) {
        clearTimeout(this._resolveTimer);
        this._resolveTimer = null;
      }

      if (this._muted || this.audioChunks.length === 0) return;

      // [Optimization] 初始缓冲策略：等待至少 3 个 chunks 再开始解码播放
      // 这样可以减少网络抖动带来的卡顿，代价是首字延迟稍微增加
      if (this.firstPlay && this.audioChunks.length < 3 && !this.endSignalSent) {
        console.log('[' + this.agentId + '] ⏳ 初始缓冲中... (' + this.audioChunks.length + '/3)');
        return;
      }

      // 移动端：音频开始播放时，滚动到当前发言人的对话框
      // 取出当前所有待播放 chunk
      var chunks = this.audioChunks.splice(0, this.audioChunks.length);

      // 在 promise 链开始前递增 activeSources，防止 onended 误判
      this.activeSources++;

      var self = this;
      this.playQueue = this.playQueue.then(function() {
        return self._decodeAndPlay(chunks);
      }).catch(function(e) {
        self.activeSources--;
        if (self.activeSources < 0) self.activeSources = 0;
        console.error('[' + self.agentId + '] Audio playChunks error:', e);
        // 解码失败时也要检查是否该触发回调，防止卡住
        if (self.activeSources === 0 && self.endSignalSent && self.taskFinished) {
          self.fireNearEndCallback('catch(解码失败兜底)');
        }
      });
    };

    // 实际解码+播放（由 playQueue 保证串行执行，解码顺序 = 到达顺序）
    TTSManager.prototype._decodeAndPlay = async function(chunks) {
      // 已停止，丢弃
      if (this._stopped) {
        this.activeSources--;
        if (this.activeSources < 0) this.activeSources = 0;
        return;
      }
      // 被静音后丢弃残留队列中的音频，不解码不播放
      if (this._muted) {
        this.activeSources--;
        if (this.activeSources < 0) this.activeSources = 0;
        console.log('[' + this.agentId + '] _decodeAndPlay 跳过（已静音）| activeSources=' + this.activeSources);
        return;
      }

      try {
        // 尝试批量解码
        var fullHex = chunks.join('');
        var bytes = hexToBytes(fullHex);
        var buf = await this.audioContext.decodeAudioData(bytes.buffer.slice(0));
        await this._playBuffer(buf);
      } catch (e) {
        console.warn('[' + this.agentId + '] 批量解码失败，尝试逐个解码 fallback:', e);
        
        var playedCount = 0;
        // Fallback: 逐个解码播放
        for (var i = 0; i < chunks.length; i++) {
          if (this._muted) break;
          try {
            var chunkBytes = hexToBytes(chunks[i]);
            var chunkBuf = await this.audioContext.decodeAudioData(chunkBytes.buffer.slice(0));
            
            // 第一片段使用 playChunks 预分配的配额
            // 后续片段需要新增配额，因为每个 _playBuffer 都会在 onended 中扣除配额
            if (playedCount > 0) {
              this.activeSources++;
            }
            
            await this._playBuffer(chunkBuf);
            playedCount++;
          } catch (err) {
            console.error('[' + this.agentId + '] 单个chunk解码失败:', err);
          }
        }
        
        // 如果连一个都没播放成功（全部失败），需要归还 playChunks 预分配的那个配额
        if (playedCount === 0) {
           this.activeSources--;
           if (this.activeSources < 0) this.activeSources = 0;
        }
      }
    };

    TTSManager.prototype._playBuffer = async function(buf) {
      // 已停止，丢弃
      if (this._stopped) {
        this.activeSources--;
        if (this.activeSources < 0) this.activeSources = 0;
        return;
      }
      // 解码后再次检查静音状态（解码期间可能被 mute）
      if (this._muted) {
        this.activeSources--;
        if (this.activeSources < 0) this.activeSources = 0;
        console.log('[' + this.agentId + '] _playBuffer 跳过（已静音）| activeSources=' + this.activeSources);
        return;
      }

      // 关键保护：如果说话锁已切到其他人，当前 agent 的迟到音频块必须丢弃，
      // 否则会出现“两个人同时说话”。
      if (!this.firstPlay && isSpeaking && currentSpeaker && currentSpeaker !== this.agentId) {
        this.activeSources--;
        if (this.activeSources < 0) this.activeSources = 0;
        console.warn(
          '[' + this.agentId + '] 丢弃迟到音频块：当前说话者已切换为 ' + currentSpeaker + '，避免双人重叠播报'
        );
        return;
      }

      // 首次播放：等上一位发言人的音频自然播完
      // 注意：必须在 _waitForPrevSpeaker 之后才真正标记 audioStarted，防止提前触发下一位
      var hasWaited = false;
      // 等待上一位说完
      if (this.firstPlay && this._waitForPrevSpeaker) {
        console.log('[' + this.agentId + '] ⏳ 等待上一位发言人播完...');
        await this._waitForPrevSpeaker;
        this._waitForPrevSpeaker = null;
        hasWaited = true;
        console.log('[' + this.agentId + '] ✅ 上一位已播完，开始播放');
      }

      // 二次保险：即使等待链异常提前释放，也必须等全局说话锁空闲后才能开口
      if (this.firstPlay) {
        var guardWaitStart = Date.now();
        while (isSpeaking && currentSpeaker && currentSpeaker !== this.agentId) {
          if (Date.now() - guardWaitStart > 120000) {
            console.warn('[' + this.agentId + '] ⚠️ 等待说话锁超时，强制尝试开始播放');
            break;
          }
          await new Promise(function(resolve) { setTimeout(resolve, 120); });
        }
      }

      var now = this.audioContext.currentTime;

      // 首次播放：加 600ms 启动缓冲 (原 350ms)，给后续 chunk 解码争取时间，减少卡顿
      // 重要：只有在真正等待过前一位播完后，才标记 audioStarted
      if (this.firstPlay) {
        this.nextTime = now + 0.6;
        this.firstPlay = false;
        isSpeaking = true;
        currentSpeaker = this.agentId;
        console.log('[' + this.agentId + '] 🔒 占用全局说话锁（开始实际播放）');
        // 注意：不要在这里清除 nextSpeakerPending！
        // 它需要保留到当前发言人的音频播完，以便滚动到下一位
        if (hasWaited) {
          console.log('[' + this.agentId + '] 首次播放（等待过前一位），标记 audioStarted');
        } else {
          console.log('[' + this.agentId + '] 首次播放（是第一个发言者），标记 audioStarted');
        }
        // 标记音频已开始播放
        this.audioStarted = true;
        // 先回灌预加载期缓存，再上报 speech-started，避免服务端瞬时看到 currentSpeaker=null
        this.flushDeferredCacheToServer('audio-started');
        // 通知服务器该 agent 已开始播放，清除准备状态
        this.notifySpeechStarted();
        // 移动端：音频真正开始播放时，滚动到当前发言人的对话框
        if (window.innerWidth <= 768) {
          console.log('[Mobile] 音频开始播放，滚动到: ' + this.agentId);
          scrollToAgent(this.agentId);
        }
        // 检查是否可以准备下一位（如果文本已完成）
        this.checkPrepareNext('音频开始');
      } else if (this.nextTime < now) {
        // 缓冲耗尽（来不及解码），跳到当前时间 +100ms 给恢复留余量
        var gap = now - this.nextTime;
        if (gap > 0.01) {
          console.log('[' + this.agentId + '] 缓冲不足，跳过 ' + gap.toFixed(3) + 's gap');
        }
        this.nextTime = now + 0.2;
      }

      var src = this.audioContext.createBufferSource();
      src.buffer = buf;
      src.connect(this.analyser);
      src.start(this.nextTime);
      this.nextTime += buf.duration;
      this.showIndicator(true);
      if (!this.activeSrcList) this.activeSrcList = [];
      this.activeSrcList.push(src);

      var self = this;
      
      src.onended = function() {
        // 从活跃列表中移除
        var idx = self.activeSrcList ? self.activeSrcList.indexOf(src) : -1;
        if (idx !== -1) self.activeSrcList.splice(idx, 1);

        self.activeSources--;
        if (self.activeSources <= 0) {
          self.activeSources = 0;
          self.showIndicator(false);
          
          // [Fix] 增加 800ms 防抖，防止因网络波动导致 activeSources 归零时误判为结束
          if (self._resolveTimer) clearTimeout(self._resolveTimer);
          
          self._resolveTimer = setTimeout(function() {
              self._resolveTimer = null;
              if (self.activeSources > 0) return; // 播放已恢复

              console.log('[' + self.agentId + '] [src.onended] 全部音频播完 | endSignalSent=' + self.endSignalSent + ' | taskFinished=' + self.taskFinished + ' | callbackFired=' + self.callbackFired);

              // 释放锁：仅释放自己的锁，避免误把其他正在说话的人清空
              if (isSpeaking && currentSpeaker === self.agentId) {
                console.log('[' + self.agentId + '] 语音播放完成，释放锁 (currentSpeaker=' + currentSpeaker + ')');
                isSpeaking = false;
                currentSpeaker = null;
              }
              // 通知下一位：我的音频已经播完了，你可以开始播了
              // [Fix] 必须确保文本生成也已完成（taskFinished），防止因网络卡顿导致音频中断时误判为结束
              var wsClosedOrMissing = !self.ws || self.ws.readyState !== 1;
              var onendedSrcCount = self.activeSrcList ? self.activeSrcList.length : 0;
              var onendedRemaining = self.audioContext ? (self.nextTime - self.audioContext.currentTime) : 0;
              var canResolveDone =
                self.activeSources === 0 &&
                onendedSrcCount === 0 &&
                onendedRemaining <= 0.12 &&
                (!self.audioChunks || self.audioChunks.length === 0) &&
                (self.taskFinished || wsClosedOrMissing);
              if (self._resolveMyDone && canResolveDone) {
                console.log('[' + self.agentId + '] ✅ 音频全部播完，resolve prevSpeakerDone (taskFinished=' + self.taskFinished + ', wsClosed=' + wsClosedOrMissing + ')');
                self._resolveMyDone();
                self._resolveMyDone = null;
              } else if (self._resolveMyDone) {
                console.log(
                  '[' + self.agentId + '] ⏳ 音频缓冲耗尽但尚未满足放行条件，保持 prevSpeakerDone 锁定 ' +
                  '(taskFinished=' + self.taskFinished +
                  ', wsReady=' + (self.ws ? self.ws.readyState : 'null') +
                  ', srcList=' + onendedSrcCount +
                  ', remaining=' + onendedRemaining.toFixed(2) + 's)'
                );
              }
              // 兜底：如果回调从未触发（异常情况），在音频播完时强制触发避免卡死
              if (!self.callbackFired && self.audioStarted) {
                console.warn('[' + self.agentId + '] [src.onended] 回调未触发，兜底触发（audioStarted=true）');
                self.fireNearEndCallback('src.onended兜底');
              } else if (!self.callbackFired) {
                console.log('[' + self.agentId + '] [src.onended] 回调未触发，但 audioStarted=false（还在等待前一位），跳过兜底');
              }
          }, 800);
        }
      };
    };
    
    TTSManager.prototype.showIndicator = function(show) {
      var p = document.getElementById('panel-' + this.agentId);
      if (!p) return;
      var ind = p.querySelector('.tts-indicator');
      if (!ind) {
        ind = document.createElement('span');
        ind.className = 'tts-indicator';
        ind.innerHTML = '<span style="display:inline-block;width:4px;height:4px;background:#58a6ff;border-radius:50%;animation:pulse 0.6s infinite;"></span><span style="display:inline-block;width:4px;height:4px;background:#58a6ff;border-radius:50%;animation:pulse 0.6s infinite 0.15s;margin-left:2px;"></span><span style="display:inline-block;width:4px;height:4px;background:#58a6ff;border-radius:50%;animation:pulse 0.6s infinite 0.3s;margin-left:2px;"></span>';
        p.querySelector('.panel-title').appendChild(ind);
      }
      ind.style.display = show ? 'inline-flex' : 'none';
    };
    
    // 强制停止当前所有音频播放（用于用户点停止或异常）
    TTSManager.prototype.stopPlayback = function() {
      this._stopped = true; // 阻止异步解码完成后继续播放
      this._loadPlayToken++;
      this.clearReconnectTimer();
      var remaining = this.audioContext ? (this.nextTime - this.audioContext.currentTime) : 0;
      if (this.activeSources > 0 || (this.activeSrcList && this.activeSrcList.length > 0)) {
        console.log('[' + this.agentId + '] ⛔ stopPlayback 强制停止 | activeSources=' + this.activeSources + ' | srcList=' + (this.activeSrcList ? this.activeSrcList.length : 0) + ' | 剩余音频=' + remaining.toFixed(1) + 's');
      }
      // 阻止所有待触发的回调
      this.callbackFired = true;
      if (this.nearEndTimer) {
        clearTimeout(this.nearEndTimer);
        this.nearId = null;
      }
      if (this._safetyTimer) {
        clearTimeout(this._safetyTimer);
        this._safetyTimer = null;
      }
      if (this._sendEndTimer) {
        clearTimeout(this._sendEndTimer);
        this._sendEndTimer = null;
      }
      // 停止所有正在播放的 AudioBufferSource
      if (this.activeSrcList && this.activeSrcList.length > 0) {
        this.activeSrcList.forEach(function(s) { try { s.stop(); } catch(e) {} });
        this.activeSrcList = [];
      }
      if (this._syncPlaybackSource) {
        try { this._syncPlaybackSource.stop(); } catch (e) {}
        this._syncPlaybackSource = null;
      }
      this.activeSources = 0;
      this.isPlaying = false;
      this.showIndicator(false);
      // resolve "我说完了"，防止下一位永远等不到
      if (this._resolveMyDone) {
        this._resolveMyDone();
        this._resolveMyDone = null;
      }
    };

    // 从缓存加载音频并播放（用于分机同步）
    TTSManager.prototype.loadAndPlay = function(audioHex, timestamp) {
      var self = this;
      var playbackToken = ++this._loadPlayToken;

      // 先停止之前的播放
      this.stopPlayback();

      // 确保 AudioContext 已初始化
      this.init();

      console.log('[' + this.agentId + '] 从缓存加载音频, timestamp:', timestamp);

      // 确保 AudioContext 处于运行状态
      if (this.audioContext.state === 'suspended') {
        this.audioContext.resume();
      }

      // 解码音频
      var audioBytes = hexToBytes(audioHex);
      var self = this;
      this.audioContext.decodeAudioData(
        audioBytes.buffer,
        function(buffer) {
          if (
            playbackToken !== self._loadPlayToken ||
            self._stopped ||
            self._muted ||
            !roundTableActive
          ) {
            console.log('[' + self.agentId + '] 跳过过期/停播后的 loadAndPlay 回调');
            return;
          }

          // 检查解码后的音频时长
          console.log('[Room] 音频解码成功，总时长:', buffer.duration, 's, seek位置:', timestamp, 'ms =', (timestamp / 1000).toFixed(2), 's');

          // 创建播放源
          var source = self.audioContext.createBufferSource();
          source.buffer = buffer;
          source.connect(self.audioContext.destination);
          self._syncPlaybackSource = source;

          // 计算起始位置（毫秒转秒）
          var startOffset = Math.max(0, timestamp / 1000);

          // 确保不超出音频时长
          if (startOffset >= buffer.duration) {
            console.log('[Room] seek位置超出音频时长，跳过播放');
            return;
          }

          var duration = buffer.duration - startOffset;

          console.log('[Room] 播放音频 from', startOffset.toFixed(2), 's, 剩余时长:', duration.toFixed(2), 's');

          if (duration > 0) {
            if (
              playbackToken !== self._loadPlayToken ||
              self._stopped ||
              self._muted ||
              !roundTableActive
            ) {
              console.log('[' + self.agentId + '] 跳过停播后的 sync 音频 start');
              self._syncPlaybackSource = null;
              return;
            }
            source.start(0, startOffset);
            self.isPlaying = true;
            self.showIndicator(true);

            source.onended = function() {
              if (self._syncPlaybackSource === source) {
                self._syncPlaybackSource = null;
              }
              self.isPlaying = false;
              self.showIndicator(false);
              console.log('[' + self.agentId + '] 缓存音频播放完成');

              // 分机模式：音频播放完毕后，等待轮询来检测下一个发言者
              // 不要自动从 speakerChain 播放，因为下一个可能还没进入链表
              console.log('[Room] 等待主机新发言...');
            };
          } else {
            console.log('[' + self.agentId + '] 音频已过期，无需播放');
          }
        },
        function(e) {
          console.error('[' + self.agentId + '] 音频解码失败:', e);
        }
      );
    };

    // 主机：缓存音频到服务端
    TTSManager.prototype.cacheAudioToServer = function(audioHex, isComplete) {
      var self = this;
      if (!isHost || !currentChannel) {
        console.log('[Room] 缓存跳过: isHost=' + isHost + ', currentChannel=' + currentChannel);
        return;
      }

      console.log('[Room] 缓存音频: agentId=' + this.agentId + ', isComplete=' + isComplete);

      fetch('/api/room/' + currentChannel + '/audio-cache', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          agentId: this.agentId,
          audioChunk: audioHex,
          isComplete: isComplete,
          text: this.textBuf || ''
        })
      }).catch(function(err) {
        console.error('[' + self.agentId + '] 缓存音频失败:', err);
      });
    };

    // 预加载阶段先本地缓存；真实开口后统一回灌，避免服务端 currentSpeaker 漂移为 null
    TTSManager.prototype.flushDeferredCacheToServer = function(reason) {
      if (!isHost || !currentChannel || !this.audioStarted) return;

      var pendingCount = (this._pendingCacheChunks && this._pendingCacheChunks.length) || 0;
      if (pendingCount > 0) {
        var mergedAudio = this._pendingCacheChunks.join('');
        this._pendingCacheChunks = [];
        if (mergedAudio.length > 0) {
          console.log('[' + this.agentId + '] 📤 回灌预加载音频: chunks=' + pendingCount + ', reason=' + (reason || 'unknown'));
          this.cacheAudioToServer(mergedAudio, false);
        }
      }

      if (this._pendingCacheComplete) {
        this._pendingCacheComplete = false;
        if (!this._cacheCompleteSent) {
          this._cacheCompleteSent = true;
          console.log('[' + this.agentId + '] 📤 回灌预加载完成信号: reason=' + (reason || 'unknown'));
          this.cacheAudioToServer('', true);
        }
      }
    };

    // 处理实时音频块（房间广播）
    TTSManager.prototype.handleRealTimeAudio = function(audioHex, isComplete) {
      if (!currentChannel) return;

      // 直接播放收到的音频块
      console.log('[Room] 播放实时音频块:', this.agentId, 'isComplete:', isComplete);

      // 将音频块添加到缓冲区
      if (audioHex && audioHex.length > 0) {
        this.audioChunks.push(audioHex);
      }

      // 当 isComplete 为 true 或有足够缓冲时播放
      // 首次播放等4个块就播放，减少卡顿感
      var threshold = this.firstPlay ? 4 : 4;
      if (isComplete || this.audioChunks.length >= threshold) {
        this.playChunks();
      }
    };

    // 用户主动打断：停音频 + 关 TTS WS + 标记静音（后续 chunk 不再生成 TTS）
    TTSManager.prototype.mute = function() {
      console.log('[' + this.agentId + '] 🔇 mute：用户打断，静音');
      this.stopPlayback();
      this._muted = true;
      streamFinalized[this.agentId] = true;
      // 清除回调，防止旧音频触发通知
      this.onNearEnd = null;
      this.callbackFired = true;  // 阻止任何待触发的回调
      if (this._safetyTimer) {
        clearTimeout(this._safetyTimer);
        this._safetyTimer = null;
      }
      if (this._noAudioRecoveryTimer) {
        clearTimeout(this._noAudioRecoveryTimer);
        this._noAudioRecoveryTimer = null;
      }
      if (this._speechStartedRetryTimer) {
        clearTimeout(this._speechStartedRetryTimer);
        this._speechStartedRetryTimer = null;
      }
      if (this.ws) try { this.ws.close(); } catch(e) {}
      this.ws = null;
      this.isOpen = false;
      this.audioChunks = [];
      this._syncPlaybackSource = null;
    };

    TTSManager.prototype.reset = function() {
      this.stopPlayback(); // 先停止所有播放
      if (this.ws) try { this.ws.close(); } catch(e) {}
      this.ws = null;
      this.pendingTexts = [];
      this.isOpen = false;
      this.seen.clear();
      this.audioChunks = [];
      this.isPlaying = false;
      this._muted = false; // reset 解除静音
      this.activeSources = 0;
      this.activeSrcList = [];
      this._syncPlaybackSource = null;
      this._loadPlayToken++;
      this.endSignalSent = false;
      this.taskFinished = false;
      this.callbackFired = false;
      this.textComplete = false;
      this.audioStarted = false;
      this.onNearEnd = null;
      this.speechType = 'next';
      this.playQueue = Promise.resolve();
      this.firstPlay = true;
      this._waitForPrevSpeaker = null;
      // _resolveMyDone 已在 stopPlayback 中 resolve，这里置空
      this._resolveMyDone = null;
      if (this.nearEndTimer) clearTimeout(this.nearEndTimer);
      this.nearEndTimer = null;
      if (this._safetyTimer) { clearTimeout(this._safetyTimer); this._safetyTimer = null; }
      if (this._noAudioRecoveryTimer) { clearTimeout(this._noAudioRecoveryTimer); this._noAudioRecoveryTimer = null; }
      if (this._sendEndTimer) { clearTimeout(this._sendEndTimer); this._sendEndTimer = null; }
      this._allSentTexts = [];
      this._ttsRetryCount = 0;
      this._needResendEnd = false;
      this._rateLimitCooldownUntil = 0;
      this._speechStartedNotified = false;
      this._speechStartedRetryCount = 0;
      this._cacheCompleteSent = false;
      this._turnStartedAt = 0;
      this._lastTextChunkAt = 0;
      this._lastTtsMsgAt = 0;
      this._lastTtsEvent = '';
      this._lastAudioChunkAt = 0;
      this._lastStuckDiagKey = '';
      this._lastStuckDiagAt = 0;
      streamFinalized[this.agentId] = true;
      if (this._speechStartedRetryTimer) {
        clearTimeout(this._speechStartedRetryTimer);
        this._speechStartedRetryTimer = null;
      }
      this.showIndicator(false);
    };

    function initStatusBar() {
      var statusBar = document.getElementById('status-bar');
      const agentIds = window.roomAgentIds || AGENT_IDS;
      statusBar.innerHTML = agentIds.map(function(id) {
        return '<div class="status-item"><span class="status-dot disconnected" id="status-' + id + '"></span><span>' + id.charAt(0).toUpperCase() + id.slice(1) + '</span></div>';
      }).join('');
    }

    function initConnection(agentId) {
      // 构建 WebSocket URL（支持房间参数）
      var wsUrl = (window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host + '/ws/' + agentId;
      var query = new URLSearchParams();
      if (currentChannel) {
        query.set('channel', currentChannel);
      }
      query.set('runtime_id', hostRuntimeId);
      wsUrl += '?' + query.toString();
      var ws = new WebSocket(wsUrl);
      connections[agentId].ws = ws;
      updateStatus(agentId, 'connecting');

      ws.onopen = function() {
        connections[agentId].connected = true;
        updateStatus(agentId, 'connected');
      };

      ws.onmessage = function(event) {
        var data = JSON.parse(event.data);
        // 如果是房间广播消息（type 不为 undefined），打印日志
        if (data.type && !['start', 'chunk', 'end', 'error', 'moderator', 'system'].includes(data.type)) {
          console.log('[Room WS] 收到消息:', data.type, 'agentId:', agentId);
        }
        handleMessage(agentId, data);
      };

      ws.onclose = function(evt) {
        connections[agentId].connected = false;
        updateStatus(agentId, 'disconnected');
        // 被新页面/新连接接管：不再自动重连，避免旧页面反复抢连接
        if (evt && evt.code === 4001) {
          console.warn('[Room WS] 连接被新会话接管，停止自动重连:', agentId, evt.reason || '');
          return;
        }
        // 当前 channel 在服务端已丢失：先停本地音频并触发自动建房，避免死循环重连旧 channel
        if (evt && evt.code === 4004) {
          console.warn('[Room WS] 房间不存在，停止旧 channel 重连并触发恢复:', agentId, evt.reason || '');
          nextSpeakerPending = null;
          hardStopLocalAudioAndTTS();
          resetRoundtableRuntime();
          roundtableStartedAtMs = 0;
          applyRoundTableUiState(false, { updateStatus: true, statusText: '房间已失效，正在自动重建连接...' });
          if (currentChannel) {
            recoverMissingRoom('ws_close_room_missing');
          }
          return;
        }
        setTimeout(function() { initConnection(agentId); }, 3000);
      };

      ws.onerror = function() { updateStatus(agentId, 'disconnected'); };
    }

    function updateStatus(agentId, status) {
      var dot = document.getElementById('status-' + agentId);
      if (dot) {
        dot.className = 'status-dot';
        if (status === 'disconnected') dot.classList.add('disconnected');
      }
    }

    // 当前发言累积内容（用于圆桌讨论回调）
    var currentSpeechBuffers = {};
    var roundTableActive = false;
    var isSpeaking = false; // 全局锁：是否有人正在说话
    var currentSpeaker = null; // 当前说话的人
    var prevSpeakerDone = Promise.resolve(); // 上一位发言人音频播完的 Promise
    var userInterruptTarget = null; // 用户打断时指定的目标 agent
    var nextSpeakerPending = null; // 下一位发言人
    var isInterrupted = false; // 是否正在打断状态
    var AUTO_SKIP_ON_FAILURE = false; // 调试模式：失败后不自动跳过到下一位
    var lastServerStuckDiagSignature = '';
    var lastServerStuckDiagAt = 0;
    var STUCK_DIAG_REPEAT_MS = 8000;

    function wsStateName(state) {
      if (state === WebSocket.CONNECTING) return 'CONNECTING';
      if (state === WebSocket.OPEN) return 'OPEN';
      if (state === WebSocket.CLOSING) return 'CLOSING';
      if (state === WebSocket.CLOSED) return 'CLOSED';
      return String(state);
    }

    function logServerStuckDiagnostics(diag, source) {
      if (!diag) return;
      var now = Date.now();
      var reasons = (diag.reasons || []).map(function(item) {
        var code = item && item.code ? item.code : 'unknown';
        var detail = item && item.detail ? item.detail : '';
        return detail ? (code + ':' + detail) : code;
      });
      var summary = diag.summary || (reasons.join(',') || 'none');
      var signature = diag.signature || summary;
      if (diag.isStuck) {
        if (signature !== lastServerStuckDiagSignature || (now - lastServerStuckDiagAt) >= STUCK_DIAG_REPEAT_MS) {
          console.warn(
            '[STUCK_DIAG][server][' + (source || 'unknown') + '] summary=' + summary +
            ' | reasons=' + (reasons.join(' | ') || 'none') +
            ' | snapshot=' + JSON.stringify(diag.snapshot || {})
          );
          lastServerStuckDiagSignature = signature;
          lastServerStuckDiagAt = now;
        }
        return;
      }
      if (lastServerStuckDiagSignature) {
        console.log('[STUCK_DIAG][server] cleared');
      }
      lastServerStuckDiagSignature = '';
      lastServerStuckDiagAt = 0;
    }

    function buildLocalStuckDiagnostics(agentId) {
      var mgr = ttsManagers[agentId];
      if (!mgr) return null;
      if (streamFinalized[agentId] !== false) return null;

      var now = Date.now();
      var turnAgeMs = mgr._turnStartedAt ? (now - mgr._turnStartedAt) : 0;
      var lastTextChunkAgoMs = mgr._lastTextChunkAt ? (now - mgr._lastTextChunkAt) : turnAgeMs;
      var lastTtsMsgAgoMs = mgr._lastTtsMsgAt ? (now - mgr._lastTtsMsgAt) : -1;
      var wsState = mgr.ws ? mgr.ws.readyState : -1;
      var audioQueue = (mgr.audioChunks && mgr.audioChunks.length) || 0;
      var reasons = [];

      if (!connections[agentId] || !connections[agentId].connected) {
        reasons.push('agent_ws_disconnected');
      }
      if (!mgr.ws) {
        reasons.push('tts_ws_missing');
      } else if (wsState !== WebSocket.OPEN) {
        reasons.push('tts_ws_' + wsStateName(wsState).toLowerCase());
      }
      if (mgr._waitForPrevSpeaker && !mgr.audioStarted && turnAgeMs > 3000) {
        reasons.push('waiting_prev_speaker_done');
      }
      if (!mgr.textComplete && turnAgeMs > 8000 && lastTextChunkAgoMs > 8000) {
        reasons.push('llm_no_new_text_chunk');
      }
      if (mgr.textComplete && !mgr.audioStarted && audioQueue === 0 && turnAgeMs > 3000) {
        reasons.push('text_done_no_audio_start');
      }
      if (mgr.taskFinished && !mgr.audioStarted && audioQueue === 0) {
        reasons.push('tts_finished_without_audio');
      }
      if (mgr.audioStarted && !mgr.taskFinished && mgr.activeSources === 0 && audioQueue === 0 && turnAgeMs > 6000) {
        reasons.push('audio_drained_waiting_tts_finish');
      }
      if (mgr.audioStarted && mgr.taskFinished && mgr.activeSources === 0 && audioQueue === 0 && !mgr.callbackFired) {
